<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .marker { padding: 8px; background: #000; border: 1px solid #0f0; color: #0f0; font-size: 10px; }
        #terminal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #msg-box { flex: 1; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border: 1px solid #030; max-width: 85%; }
        .msg.me { align-self: flex-end; border-color: #0f0; }
        .msg.them { align-self: flex-start; background: #010; }
        .input-area { display: flex; background: #000; border-top: 1px solid #0f0; padding-top: 10px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #030; color: #0f0; padding: 12px; outline: none; }
        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 15px; margin-bottom: 10px; background: rgba(0,255,0,0.1); }
        .venue-card { border: 1px solid #0f0; padding: 10px; margin-top: 10px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <div id="oracle-ballot"><div id="venue-list">Capturing GPS...</div></div>
        <div id="msg-box"></div>
        <div class="input-area"><input type="text" id="chat-in" placeholder="MESSAGE..."><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px 20px; margin-left:5px;">SEND</button></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        let currentN = null;

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            data?.forEach(n => {
                const el = document.createElement('div'); el.className = 'marker'; el.innerText = n.intent;
                el.onclick = async () => { 
                    currentN = n; await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync(); startOracleSync();
                };
                new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
            });
        }

        function renderMsg(m) { const box = document.getElementById('msg-box'); const div = document.createElement('div'); div.className = `msg ${m.sender === 'SEEKER' ? 'me' : 'them'}`; div.innerText = m.content; box.appendChild(div); box.scrollTop = box.scrollHeight; }
        window.sendMsg = async () => { const val = document.getElementById('chat-in').value; if(!val) return; renderMsg({sender:'SEEKER', content:val}); await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]); document.getElementById('chat-in').value=''; }
        function startChatSync() { _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => { if(p.new.sender !== 'SEEKER') renderMsg(p.new); }).subscribe(); }

        async function startOracleSync() {
            // Check immediately if the Creator already started the session
            const check = async () => {
                const { data } = await _supabase.from('oracle_sessions').select('*').eq('bridge_id', currentN.id).single();
                if (data && data.u1_lat && !data.u2_lat) captureAndUploadGPS();
            };
            check(); // Run once at start

            _supabase.channel('oracle-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${currentN.id}` }, async (p) => {
                const s = p.new;
                if (s && s.u1_lat && !s.u2_lat) captureAndUploadGPS();
                if (s && s.u1_lat && s.u2_lat) fetchVenues(s.u1_lat, s.u1_lng, s.u2_lat, s.u2_lng);
            }).subscribe();
        }

        function captureAndUploadGPS() {
            document.getElementById('oracle-ballot').style.display = 'block';
            navigator.geolocation.getCurrentPosition(async (gps) => {
                await _supabase.from('oracle_sessions').update({ u2_lat: gps.coords.latitude, u2_lng: gps.coords.longitude }).eq('bridge_id', currentN.id);
            }, (err) => { alert("GPS Denied: " + err.message); });
        }

        async function fetchVenues(lat1, lng1, lat2, lng2) {
            const midLat = (parseFloat(lat1) + parseFloat(lat2)) / 2;
            const midLng = (parseFloat(lng1) + parseFloat(lng2)) / 2;
            const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/cafe.json?proximity=${midLng},${midLat}&limit=3&access_token=${MAPBOX_TOKEN}`);
            const d = await res.json();
            const list = document.getElementById('venue-list'); list.innerHTML = '';
            d.features.forEach(f => { list.innerHTML += `<div class="venue-card" onclick="alert('Selected')">[ OPTION ]: ${f.text.toUpperCase()}</div>`; });
        }
        setInterval(scan, 5000); scan();
    </script>
</body>
</html>
