<!DOCTYPE html>
<html>
<head>
    <title>VESSEL | CREATOR</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #0f0; --bg: #000; --dim: #030; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Ensure the map container has height and width or it will be black */
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            width: 100%; 
            height: 100vh; 
            z-index: 1;
        }
        
        #fab { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #000; border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); font-size: 30px; cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon); }
        .hud-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: rgba(0,0,0,0.95); border: 1px solid var(--neon); padding: 25px; width: 320px; box-shadow: 0 0 30px rgba(0,255,0,0.3); color: var(--neon); font-family: 'Courier New', monospace; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; color: var(--neon); border: 1px solid var(--neon); cursor: pointer; font-family: monospace; text-align: left; }
        
        #inbox-launcher { position: absolute; top: 15px; right: 15px; z-index: 1000; background: #000; border: 1px solid var(--neon); padding: 10px; color: var(--neon); cursor: pointer; font-family: monospace; font-size: 12px; }
        #inbox-panel { display: none; position: absolute; top: 70px; right: 15px; width: 300px; height: 400px; background: rgba(0,0,0,0.95); border: 1px solid var(--neon); z-index: 1000; flex-direction: column; color: var(--neon); font-family: monospace; }
        #queue-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .queue-card { border: 1px solid var(--dim); padding: 10px; margin-bottom: 10px; background: rgba(0,20,0,0.2); }
        .approve-btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; font-family: monospace; }

        #terminal { display: none; height: 100vh; width: 100vw; flex-direction: column; background: #000; padding: 20px; box-sizing: border-box; z-index: 3000; position: absolute; top: 0; left: 0; font-family: 'Courier New', monospace; color: var(--neon); }
        #msg-box { flex-grow: 1; overflow-y: auto; border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; max-width: 80%; padding: 8px; border: 1px solid var(--dim); }
        .msg.me { align-self: flex-end; border-color: var(--neon); }
        .msg.them { align-self: flex-start; background: var(--dim); color: #fff; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="fab" onclick="startCreation()">+</button>
    <div id="inbox-launcher" onclick="toggleInbox()">[ INBOX / QUEUE ]</div>

    <div id="inbox-panel">
        <div style="padding:10px; border-bottom:1px solid #0f0; text-align:center;">QUALIFIED MATCHES</div>
        <div id="queue-list"></div>
    </div>

    <div id="step-category" class="hud-panel">
        <div style="border-bottom:1px solid #0f0; margin-bottom:10px; padding-bottom:5px;">SELECT INTENT</div>
        <button class="option-btn" onclick="selectCategory('☕ Coffee')">☕ Coffee</button>
        <button class="option-btn" onclick="selectCategory('💬 Chat')">💬 Chat</button>
        <button class="option-btn" onclick="selectCategory('🚶 Walk')">🚶 Walk</button>
        <button class="option-btn" onclick="selectCategory('✨ Connect')">✨ Connect</button>
    </div>

    <div id="step-vibe" class="hud-panel">
        <div style="border-bottom:1px solid #0f0; margin-bottom:10px; padding-bottom:5px;">SELECT VIBE</div>
        <div id="vibe-options"></div>
    </div>

    <div id="step-secret" class="hud-panel">
        <div style="border-bottom:1px solid #0f0; margin-bottom:10px; padding-bottom:5px;">SET SECRET GATE</div>
        <div id="secret-q-text" style="margin-bottom:15px; font-size:14px;"></div>
        <button class="option-btn" id="opt-a" onclick="finalizeNode(true)"></button>
        <button class="option-btn" id="opt-b" onclick="finalizeNode(false)"></button>
    </div>

    <div id="terminal">
        <div id="timer" style="color:red; text-align:right; font-size:20px;">45:00</div>
        <div id="msg-box"></div>
        <input type="text" id="chat-in" placeholder="SYSTEM READY. TYPE MESSAGE..." style="background:#000; border:1px solid #0f0; color:#0f0; padding:15px; outline:none; font-family:monospace;" onkeypress="if(event.key==='Enter') sendMsg()">
    </div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        
        // Ensure Mapbox initializes properly
        const map = new mapboxgl.Map({ 
            container: 'map', 
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [55.2708, 25.2048], 
            zoom: 11 
        });

        let nodeData = {}, myNodeId = null;
        const templates = {
            '☕ Coffee': { vibes: ['Quick chat', 'Deep convo'], q: 'Quiet café or loud café?', a: ['Quiet café', 'Loud café'] },
            '💬 Chat': { vibes: ['Deep talk', 'Funny banter'], q: 'Deep talks or small talk?', a: ['Deep talks', 'Small talk'] },
            '🚶 Walk': { vibes: ['Sunset stroll', 'Talk & walk'], q: 'Walk with music?', a: ['No music', 'Full speaker mode'] },
            '✨ Connect': { vibes: ['Genuine curiosity'], q: 'Best first energy?', a: ['Genuine curiosity', 'Flexing'] }
        };

        window.startCreation = () => { 
            alert("Click map to place Node."); 
            map.once('click', (e) => { 
                nodeData.lat = e.lngLat.lat; 
                nodeData.lng = e.lngLat.lng; 
                document.getElementById('step-category').style.display='block'; 
            }); 
        };

        window.selectCategory = (cat) => { 
            nodeData.intent = cat; 
            document.getElementById('step-category').style.display='none'; 
            const vDiv = document.getElementById('vibe-options'); 
            vDiv.innerHTML = ''; 
            templates[cat].vibes.forEach(v => { 
                vDiv.innerHTML += `<button class="option-btn" onclick="selectVibe('${v}')">${v}</button>`; 
            }); 
            document.getElementById('step-vibe').style.display='block'; 
        };

        window.selectVibe = (vibe) => { 
            nodeData.vibe_tag = vibe; 
            document.getElementById('step-vibe').style.display='none'; 
            const t = templates[nodeData.intent]; 
            document.getElementById('secret-q-text').innerText = t.q; 
            document.getElementById('opt-a').innerText = t.a[0]; 
            document.getElementById('opt-b').innerText = t.a[1]; 
            document.getElementById('step-secret').style.display='block'; 
        };

        window.finalizeNode = async (isA) => {
            const t = templates[nodeData.intent];
            const { data, error } = await _supabase.from('nodes').insert([{ 
                lat: nodeData.lat, 
                lng: nodeData.lng, 
                intent: nodeData.intent, 
                vibe_tag: nodeData.vibe_tag, 
                secret_q: t.q, 
                secret_a_adx: isA ? t.a[0] : t.a[1], 
                status: 'active', 
                user_id: 'BAD_CREATOR', 
                type: 'public', 
                expires_at: new Date(Date.now() + 45 * 60000).toISOString() 
            }]).select();
            
            if(data) { 
                myNodeId = data[0].id; 
                new mapboxgl.Marker({color: '#0f0'}).setLngLat([nodeData.lng, nodeData.lat]).addTo(map); 
                document.getElementById('step-secret').style.display='none'; 
                alert("NODE CREATED."); 
                setInterval(fetchQueue, 5000); 
            }
        };

        window.toggleInbox = () => { 
            const p = document.getElementById('inbox-panel'); 
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; 
            if(p.style.display === 'flex') fetchQueue(); 
        };

        async function fetchQueue() { 
            if(!myNodeId) return; 
            const { data } = await _supabase.from('requests').select('*').eq('node_id', myNodeId).eq('status', 'pending'); 
            const list = document.getElementById('queue-list'); 
            list.innerHTML = ''; 
            data?.forEach(r => { 
                list.innerHTML += `<div class="queue-card">Qualified Match<button class="approve-btn" onclick="approveMatch(${r.id})">APPROVE BRIDGE</button></div>`; 
            }); 
        }

        window.approveMatch = async (rid) => {
            await _supabase.from('nodes').update({ status: 'bridged' }).eq('id', myNodeId);
            await _supabase.from('requests').update({ status: 'approved' }).eq('id', rid);
            document.getElementById('inbox-panel').style.display = 'none';
            document.getElementById('terminal').style.display = 'flex';
            startChatSync();
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'messages', 
                filter: `node_id=eq.${myNodeId}` 
            }, payload => {
                if(payload.new.sender !== 'BAD_CREATOR') renderMsg(payload.new);
            }).subscribe();
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-in');
            const val = input.value; if(!val) return;
            renderMsg({ sender: 'BAD_CREATOR', content: val });
            await _supabase.from('messages').insert([{ node_id: myNodeId, sender: 'BAD_CREATOR', content: val }]);
            input.value = '';
        }

        function renderMsg(m) {
            const box = document.getElementById('msg-box');
            const div = document.createElement('div');
            div.className = `msg ${m.sender === 'BAD_CREATOR' ? 'me' : 'them'}`;
            div.innerText = m.content;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
