<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | CREATOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; }
        #terminal { display: none; position: fixed; bottom: 10px; left: 5%; width: 90%; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 2000; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #msg-box { height: 150px; overflow-y: auto; color:#0f0; margin-bottom: 10px; border: 1px solid #030; padding: 5px; display: flex; flex-direction: column; }
        #oracle-ballot { display: none; color:#0f0; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); font-size: 11px; text-align: center; }
        #nav-hud { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 10, 0, 0.95); border-top: 2px solid #0f0; z-index: 4000; padding: 20px; text-align: center; color: #0f0; box-sizing: border-box; }
        #fab { position: absolute; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #000; border: 2px solid #0f0; border-radius: 50%; color: #0f0; font-size: 35px; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #0f0; }
        .hud-btn { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 10px 5px; cursor: pointer; font-family: monospace; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="fab" onclick="startCreation()">+</button>
    <div id="terminal">
        <div id="oracle-ballot">STATUS: PENDING</div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none; width:100%; padding:12px; background:transparent; border:1px solid #0f0; color:#0f0; margin-bottom:10px; cursor:pointer;">[ SYNC GPS WITH ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;">
            <input type="text" id="chat-in" placeholder="TYPE..." onkeypress="if(event.key==='Enter') sendMsg()" style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px; outline:none;">
            <button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px; margin-left:5px; cursor:pointer; font-weight:bold;">SEND</button>
        </div>
    </div>
    <div id="nav-hud"><h3 id="target-name">MATCHED</h3><button class="hud-btn" onclick="location.reload()">TERMINATE</button></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const MAX_VENUE_DISTANCE_KM = 18;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });
        let currentN = null, myLoc = {lat: 0, lng: 0}, oracleProcessed = false, requestPollInterval = null;

        navigator.geolocation.watchPosition(p => { 
            myLoc = {lat: p.coords.latitude, lng: p.coords.longitude};
            console.log('📍 CREATOR GPS:', myLoc.lat, myLoc.lng);
        }, null, {enableHighAccuracy: true});

        function haversineDistanceKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function bboxFromMidpoint(midLat, midLng, radiusKm) {
            const latDegPerKm = 1 / 111.32;
            const lngDegPerKm = 1 / (111.32 * Math.cos(midLat * Math.PI / 180));
            const dLat = radiusKm * latDegPerKm;
            const dLng = radiusKm * lngDegPerKm;
            return `${midLng - dLng},${midLat - dLat},${midLng + dLng},${midLat + dLat}`;
        }

        function openChatIfRequested() {
            if (currentN && document.getElementById('terminal').style.display !== 'flex') {
                _supabase.from('requests').select('*').eq('node_id', currentN.id).limit(1).then(({ data }) => {
                    if (data && data.length > 0) {
                        console.log('📩 Request found via poll!');
                        document.getElementById('terminal').style.display = 'flex';
                        startChatSync(); 
                        startOracleLive();
                        if (requestPollInterval) clearInterval(requestPollInterval);
                    }
                });
            }
        }

        window.startCreation = () => {
            map.once('click', async (e) => {
                const { data } = await _supabase.from('nodes').insert([{ lat: e.lngLat.lat, lng: e.lngLat.lng, intent: '☕ Coffee', status: 'active' }]).select();
                currentN = data[0];
                console.log('🟢 Node created:', currentN.id);
                new mapboxgl.Marker({color: '#0f0'}).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map);
                
                const channel = _supabase.channel('reqs-' + currentN.id)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: `node_id=eq.${currentN.id}` }, (payload) => {
                        console.log('📩 Request received via realtime!');
                        document.getElementById('terminal').style.display = 'flex';
                        startChatSync(); 
                        startOracleLive();
                        if (requestPollInterval) clearInterval(requestPollInterval);
                    }).subscribe((status) => {
                        console.log('🔌 Realtime subscription:', status);
                    });

                requestPollInterval = setInterval(openChatIfRequested, 3000);
                console.log('⏳ Waiting for seeker...');
            });
        };

        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            if (!val.trim()) return;
            await _supabase.from('messages').insert([{node_id:currentN.id, sender:'CREATOR', content:val}]);
            document.getElementById('chat-in').value = '';
            document.getElementById('oracle-btn').style.display = 'block';
        };

        function startChatSync() {
            _supabase.channel('msgs-' + currentN.id)
                .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => {
                    document.getElementById('msg-box').innerHTML += `<div style="color:#0f0">> ${p.new.content}</div>`;
                    document.getElementById('oracle-btn').style.display = 'block';
                }).subscribe();
        }

        window.initiateOracle = async () => {
            if (!myLoc || myLoc.lat === 0) { console.warn('⚠️ GPS not ready'); return; }
            console.log('🔮 Creator oracle GPS:', myLoc.lat, myLoc.lng);
            await _supabase.from('oracle_sessions').upsert({ bridge_id: currentN.id, u1_lat: myLoc.lat, u1_lng: myLoc.lng }, { onConflict: 'bridge_id' });
        };

        function startOracleLive() {
            _supabase.channel('oracle-' + currentN.id)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${currentN.id}` }, async payload => {
                const s = payload.new;
                console.log('🔮 Oracle state:', s.status, '| u1:', s.u1_lat, s.u1_lng, '| u2:', s.u2_lat, s.u2_lng);

                document.getElementById('oracle-ballot').innerText = `STATUS: ${s.status.toUpperCase()}`;
                document.getElementById('oracle-ballot').style.display = 'block';

                const hasValidGPS = (s.u1_lat && s.u1_lng && s.u2_lat && s.u2_lng &&
                    s.u1_lat !== 0 && s.u1_lng !== 0 && s.u2_lat !== 0 && s.u2_lng !== 0);

                if (hasValidGPS && s.status === 'pending') {
                    await _supabase.from('oracle_sessions').update({ status: 'ready' }).eq('bridge_id', currentN.id);
                }
                if (s.status === 'ready' && !s.options_generated && !oracleProcessed) {
                    oracleProcessed = true;
                    await runOracleBrain(s);
                }
                if (s.status === 'matched') triggerSync(s);
            }).subscribe();
        }

        async function runOracleBrain(s) {
            const midLat = (s.u1_lat + s.u2_lat) / 2;
            const midLng = (s.u1_lng + s.u2_lng) / 2;
            const userDistanceKm = haversineDistanceKm(s.u1_lat, s.u1_lng, s.u2_lat, s.u2_lng);
            console.log('🧠 Oracle running... Midpoint:', midLat, midLng, 'Distance:', userDistanceKm.toFixed(2), 'km');

            const searchQueries = ['cafe', 'coffee', 'restaurant', 'mall', 'park'];
            let bestVenue = null;

            for (const query of searchQueries) {
                const radiusSteps = [2, 5, 10, 15, MAX_VENUE_DISTANCE_KM];
                for (const radius of radiusSteps) {
                    if (bestVenue) break;
                    const bbox = bboxFromMidpoint(midLat, midLng, radius);
                    const url = `https://api.mapbox.com/search/geocode/v6/forward?q=${encodeURIComponent(query)}&proximity=${midLng},${midLat}&bbox=${bbox}&limit=5&language=en&access_token=${MAPBOX_TOKEN}`;
                    console.log(`   Searching: "${query}" radius=${radius}km`);
                    try {
                        const res = await fetch(url);
                        const d = await res.json();
                        if (d.features && d.features.length > 0) {
                            const nearbyVenues = d.features.filter(f => {
                                const vLat = f.geometry.coordinates[1];
                                const vLng = f.geometry.coordinates[0];
                                return haversineDistanceKm(midLat, midLng, vLat, vLng) <= MAX_VENUE_DISTANCE_KM;
                            });
                            if (nearbyVenues.length > 0) {
                                nearbyVenues.sort((a, b) => {
                                    const distA = haversineDistanceKm(midLat, midLng, a.geometry.coordinates[1], a.geometry.coordinates[0]);
                                    const distB = haversineDistanceKm(midLat, midLng, b.geometry.coordinates[1], b.geometry.coordinates[0]);
                                    return distA - distB;
                                });
                                bestVenue = nearbyVenues[0];
                                console.log(`   ✅ FOUND: ${bestVenue.properties.name}`);
                                break;
                            }
                        }
                    } catch (err) { console.warn('   ⚠️ Search error:', err.message); }
                }
                if (bestVenue) break;
            }

            if (bestVenue) {
                const vLat = bestVenue.geometry.coordinates[1];
                const vLng = bestVenue.geometry.coordinates[0];
                const vName = bestVenue.properties.name || bestVenue.properties.full_address || bestVenue.properties.place_formatted || 'Venue';
                console.log(`🎯 Final: ${vName} at [${vLat}, ${vLng}]`);
                await _supabase.from('oracle_sessions').update({ 
                    status: 'matched', options_generated: true, 
                    selected_venue_name: vName, selected_lat: vLat, selected_lng: vLng 
                }).eq('bridge_id', currentN.id);
            } else {
                console.warn('⚠️ Fallback to midpoint');
                await _supabase.from('oracle_sessions').update({ 
                    status: 'matched', options_generated: true, 
                    selected_venue_name: 'Midpoint Meeting Spot', selected_lat: midLat, selected_lng: midLng 
                }).eq('bridge_id', currentN.id);
            }
        }

        function triggerSync(s) {
            // Parse all coords to numbers
            const u1lat = parseFloat(s.u1_lat);
            const u1lng = parseFloat(s.u1_lng);
            const u2lat = parseFloat(s.u2_lat);
            const u2lng = parseFloat(s.u2_lng);
            const vlat = parseFloat(s.selected_lat);
            const vlng = parseFloat(s.selected_lng);

            console.log('🗺️ Drawing routes:');
            console.log('   Creator:', u1lat, u1lng);
            console.log('   Seeker:', u2lat, u2lng);
            console.log('   Venue:', vlat, vlng, s.selected_venue_name);

            if (!vlat || !vlng || Math.abs(vlat) > 90 || Math.abs(vlng) > 180 ||
                !u1lat || Math.abs(u1lat) > 90 || Math.abs(u1lng) > 180 ||
                !u2lat || Math.abs(u2lat) > 90 || Math.abs(u2lng) > 180) {
                console.error('❌ INVALID COORDINATES - aborting');
                return;
            }

            document.getElementById('terminal').style.display = 'none';
            document.getElementById('nav-hud').style.display = 'block';
            document.getElementById('target-name').innerText = `MEET AT: ${s.selected_venue_name.toUpperCase()}`;
            
            // Add markers for all 3 points
            new mapboxgl.Marker({color: '#0f0'}).setLngLat([u1lng, u1lat]).setPopup(new mapboxgl.Popup().setText('You')).addTo(map);
            new mapboxgl.Marker({color: '#00ffaa'}).setLngLat([u2lng, u2lat]).setPopup(new mapboxgl.Popup().setText('Seeker')).addTo(map);
            new mapboxgl.Marker({color: '#ff0'}).setLngLat([vlng, vlat]).setPopup(new mapboxgl.Popup().setText(s.selected_venue_name)).addTo(map);

            // Draw routes
            drawRoute('route-creator', u1lng, u1lat, vlng, vlat, '#0f0');
            drawRoute('route-seeker', u2lng, u2lat, vlng, vlat, '#00ffaa');
            
            // Fit bounds to show all 3 points
            const bounds = new mapboxgl.LngLatBounds()
                .extend([u1lng, u1lat])
                .extend([u2lng, u2lat])
                .extend([vlng, vlat]);
            map.fitBounds(bounds, { padding: 80, maxZoom: 15, duration: 2000 });
        }

        async function drawRoute(id, sLng, sLat, eLng, eLat, color) {
            console.log(`🛤️ Drawing ${id}: [${sLng},${sLat}] → [${eLng},${eLat}]`);
            try {
                const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${sLng},${sLat};${eLng},${eLat}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;
                const res = await fetch(url);
                const d = await res.json();
                
                if (!d.routes || !d.routes[0]) {
                    console.warn(`⚠️ No route for ${id}, trying walking...`);
                    // Fallback to walking
                    const walkUrl = `https://api.mapbox.com/directions/v5/mapbox/walking/${sLng},${sLat};${eLng},${eLat}?geometries=geojson&overview=full&access_token=${MAPBOX_TOKEN}`;
                    const walkRes = await fetch(walkUrl);
                    const walkD = await walkRes.json();
                    if (!walkD.routes || !walkD.routes[0]) {
                        console.warn(`⚠️ No walking route either for ${id}`);
                        return;
                    }
                    renderRoute(id, walkD.routes[0].geometry, color);
                    return;
                }
                renderRoute(id, d.routes[0].geometry, color);
            } catch (err) {
                console.warn(`⚠️ Route error for ${id}:`, err.message);
            }
        }

        function renderRoute(id, geometry, color) {
            if (map.getLayer(id)) map.removeLayer(id);
            if (map.getSource(id)) map.removeSource(id);
            map.addSource(id, {
                type: 'geojson',
                data: { type: 'Feature', properties: {}, geometry: geometry }
            });
            map.addLayer({
                id: id,
                type: 'line',
                source: id,
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: { 'line-color': color, 'line-width': 6, 'line-opacity': 0.9 }
            });
            console.log(`✅ Route ${id} drawn`);
        }
    </script>
</body>
</html>
