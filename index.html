<!DOCTYPE html>
<html>
<head>
    <title>VESSEL | CREATOR</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #0f0; --bg: #000; --dim: #030; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; top:0; left:0; }
        
        /* UI Layers */
        #fab { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--bg); border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); font-size: 30px; cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon); }
        .hud-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: rgba(0,0,0,0.95); border: 1px solid var(--neon); padding: 25px; width: 320px; box-shadow: 0 0 30px rgba(0,255,0,0.3); }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; color: var(--neon); border: 1px solid var(--neon); cursor: pointer; font-family: monospace; text-align: left; font-size: 14px; }
        .option-btn:hover { background: var(--neon); color: var(--bg); }
        .header { border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        #inbox-launcher { position: absolute; top: 15px; right: 15px; z-index: 1000; background: var(--bg); border: 1px solid var(--neon); padding: 10px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button id="fab" onclick="startCreation()">+</button>
    <div id="inbox-launcher" onclick="toggleInbox()">[ INBOX / QUEUE ]</div>

    <div id="step-category" class="hud-panel">
        <div class="header">INTENT CATEGORY</div>
        <button class="option-btn" onclick="selectCategory('☕ Coffee')">☕ Coffee</button>
        <button class="option-btn" onclick="selectCategory('💬 Chat')">💬 Chat</button>
        <button class="option-btn" onclick="selectCategory('🚶 Walk')">🚶 Walk</button>
        <button class="option-btn" onclick="selectCategory('✨ Connect')">✨ Connect</button>
    </div>

    <div id="step-vibe" class="hud-panel">
        <div class="header">SELECT VIBE</div>
        <div id="vibe-options"></div>
    </div>

    <div id="step-secret" class="hud-panel">
        <div class="header">SET SECRET GATE</div>
        <div id="secret-q-text" style="margin-bottom:15px; font-size: 14px;"></div>
        <button class="option-btn" id="opt-a" onclick="finalizeNode(true)"></button>
        <button class="option-btn" id="opt-b" onclick="finalizeNode(false)"></button>
    </div>

    <script>
        // CRITICAL: Initialize Supabase immediately
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        const map = new mapboxgl.Map({ 
            container: 'map', 
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [55.2708, 25.2048], 
            zoom: 11 
        });

        let nodeData = { intent: '', vibe_tag: '', secret_q: '', secret_a_adx: '', lat: 0, lng: 0 };
        let myNodeId = null;

        const templates = {
            '☕ Coffee': { vibes: ['Quick chat', 'Deep convo', 'Work break'], q: 'Quiet café or loud café?', a: ['Quiet café', 'Loud café'] },
            '💬 Chat': { vibes: ['Deep talk', 'Funny banter', 'Vent session'], q: 'Deep talks or small talk?', a: ['Deep talks', 'Small talk'] },
            '🚶 Walk': { vibes: ['Sunset stroll', 'Talk & walk', 'Chill walk'], q: 'Walk with music?', a: ['No music', 'Full speaker mode'] },
            '✨ Connect': { vibes: ['Genuine curiosity', 'Chill energy'], q: 'Best first energy?', a: ['Genuine curiosity', 'Flexing'] }
        };

        // EXPLICITLY DEFINE startCreation ON THE WINDOW OBJECT
        window.startCreation = function() {
            alert("Protocol Initiated. Click map to set Node.");
            map.once('click', (e) => {
                nodeData.lat = e.lngLat.lat;
                nodeData.lng = e.lngLat.lng;
                document.getElementById('step-category').style.display = 'block';
            });
        };

        window.selectCategory = function(cat) {
            nodeData.intent = cat;
            document.getElementById('step-category').style.display = 'none';
            const vDiv = document.getElementById('vibe-options');
            vDiv.innerHTML = '';
            templates[cat].vibes.forEach(v => {
                vDiv.innerHTML += `<button class="option-btn" onclick="selectVibe('${v}')">${v}</button>`;
            });
            document.getElementById('step-vibe').style.display = 'block';
        };

        window.selectVibe = function(vibe) {
            nodeData.vibe_tag = vibe;
            document.getElementById('step-vibe').style.display = 'none';
            const t = templates[nodeData.intent];
            document.getElementById('secret-q-text').innerText = t.q;
            nodeData.secret_q = t.q;
            document.getElementById('opt-a').innerText = t.a[0];
            document.getElementById('opt-b').innerText = t.a[1];
            document.getElementById('step-secret').style.display = 'block';
        };

        window.finalizeNode = async function(isOptionA) {
            const t = templates[nodeData.intent];
            nodeData.secret_a_adx = isOptionA ? t.a[0] : t.a[1];
            document.getElementById('step-secret').style.display = 'none';

            const expires = new Date(Date.now() + 45 * 60000).toISOString();
            
            const { data, error } = await _supabase.from('nodes').insert([{ 
                ...nodeData, 
                status: 'active',
                expires_at: expires
            }]).select();

            if(data) {
                myNodeId = data[0].id;
                new mapboxgl.Marker({color: '#0f0'}).setLngLat([nodeData.lng, nodeData.lat]).addTo(map);
                alert("NODE LIVE. Awaiting qualified connections.");
            } else if (error) {
                console.error("Insert failed:", error);
            }
        };

        window.toggleInbox = function() {
            const p = document.getElementById('inbox-panel');
            if(p) p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        };
    </script>
</body>
</html>
