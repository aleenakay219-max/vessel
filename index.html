<!DOCTYPE html>
<html>
<head>
    <title>VESSEL: CREATOR</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        #status { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid #0f0; }
        #chat-ui { display: none; height: 100vh; width: 100vw; flex-direction: column; background: #000; padding: 20px; box-sizing: border-box; }
        #messages-box { flex-grow: 1; overflow-y: auto; border: 1px solid #0f0; margin-bottom: 15px; padding: 15px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 15px; font-family: monospace; width: 100%; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>
    <div id="status">SYSTEM READY...</div>
    <div id="map"></div>
    <div id="chat-ui">
        <h2>[ SECURE TERMINAL ]</h2>
        <div id="messages-box"></div>
        <input type="text" id="chat-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
    </div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        let myNodeId = null;

        map.on('click', async (e) => {
            if (myNodeId) return;
            const { data, error } = await _supabase.from('nodes').insert([{ lat: e.lngLat.lat, lng: e.lngLat.lng, status: 'active' }]).select();
            if (error) { alert("DATABASE ERROR: " + error.message); return; }

            myNodeId = data[0].id;
            document.getElementById('status').innerText = "LIVE NODE: " + myNodeId;
            new mapboxgl.Marker({color: '#0f0'}).setLngLat(e.lngLat).addTo(map);

            setInterval(async () => {
                const { data: node } = await _supabase.from('nodes').select('status').eq('id', myNodeId).single();
                if (node && node.status === 'bridged') {
                    document.getElementById('map').style.display = 'none';
                    document.getElementById('chat-ui').style.display = 'flex';
                    fetchMessages();
                }
            }, 2000);
            setInterval(fetchMessages, 3000);
        });

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const { error } = await _supabase.from('messages').insert([{ node_id: myNodeId, sender: 'CREATOR', content: input.value }]);
            if (error) { alert("SEND ERROR: " + error.message); }
            input.value = '';
            fetchMessages();
        }

        async function fetchMessages() {
            if (!myNodeId) return;
            const { data, error } = await _supabase.from('messages').select('*').eq('node_id', myNodeId).order('created_at', { ascending: true });
            if (error) { console.log("FETCH ERROR:", error.message); return; }
            document.getElementById('messages-box').innerHTML = data.map(m => `<div>[${m.sender}] ${m.content}</div>`).join('');
        }
    </script>
</body>
</html>
