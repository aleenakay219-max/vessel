<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; transition: background 0.3s; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; }
        #terminal { display: none; position: fixed; bottom: 10px; left: 5%; width: 90%; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 2000; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); color: #0f0; }
        .venue-card { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin-top: 5px; font-size: 11px; text-transform: uppercase; }
        #msg-box { height: 150px; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; color: #0f0; }
        .msg { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #010; padding-bottom: 4px; }
        #nav-hud { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 10, 0, 0.95); border-top: 2px solid #0f0; z-index: 4000; padding: 20px; box-sizing: border-box; text-align: center; color: #0f0; }
        .hud-btn { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 10px 5px; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <div id="oracle-ballot"><div id="venue-list">Analyzing Midpoint...</div></div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none; width:100%; padding:12px; background:transparent; border:1px solid #0f0; color:#0f0; margin-bottom:10px;">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;"><input type="text" id="chat-in" style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px;"><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px; margin-left:5px;">SEND</button></div>
    </div>
    <div id="nav-hud">
        <h3 id="target-name" style="margin:0;">LOCATION SYNCED</h3>
        <p id="eta-display" style="font-size:12px;"></p>
        <button class="hud-btn" onclick="location.reload()">TERMINATE</button>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });
        let currentN = null, msgCount = 0, myLoc = null, peerLoc = null;

        navigator.geolocation.watchPosition(p => { myLoc = {lat: p.coords.latitude, lng: p.coords.longitude}; });

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            document.querySelectorAll('.mapboxgl-marker').forEach(m => m.remove());
            data?.forEach(n => {
                const el = document.createElement('div'); el.style.cssText = "color:#0f0; background:#000; border:1px solid #0f0; padding:5px; font-size:10px; cursor:pointer;"; el.innerText = "[ NODE ]";
                el.onclick = async () => { 
                    currentN = n; await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync(); startOracleSync();
                };
                new mapboxgl.Marker(el).setLngLat([parseFloat(n.lng), parseFloat(n.lat)]).addTo(map);
            });
        }

        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]);
            document.getElementById('chat-in').value = '';
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => {
                const box = document.getElementById('msg-box');
                box.innerHTML += `<div class="msg ${p.new.sender === 'SEEKER' ? 'me' : 'them'}">${p.new.content}</div>`;
                box.scrollTop = box.scrollHeight;
                if(++msgCount >= 5) document.getElementById('oracle-btn').style.display = 'block';
            }).subscribe();
        }

        window.initiateOracle = () => {
            document.getElementById('oracle-btn').innerText = "[ SIGNAL SENT... ]";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('oracle_sessions').upsert({ bridge_id: currentN.id, u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude }, { onConflict: 'bridge_id' });
                checkSyncManual();
            });
        };

        function startOracleSync() {
            _supabase.channel('oracle-sync').on('postgres_changes', { event:'*', schema:'public', table:'oracle_sessions', filter:`bridge_id=eq.${currentN.id}` }, p => {
                const s = p.new || p.old;
                if(s.status === 'matched') triggerSync(s);
                else if(s.u1_lat && s.u2_lat) fetchVenues(s);
            }).subscribe();
            setInterval(checkSyncManual, 3000);
        }

        async function checkSyncManual() {
            if(!currentN) return;
            const { data } = await _supabase.from('oracle_sessions').select('*').eq('bridge_id', currentN.id).single();
            if(data) {
                if(data.status === 'matched') triggerSync(data);
                else if(data.u1_lat && data.u2_lat && document.getElementById('oracle-ballot').style.display !== 'block') fetchVenues(data);
            }
        }

        async function fetchVenues(s) {
            peerLoc = {lat: s.u1_lat, lng: s.u1_lng};
            const mLa = (s.u1_lat + s.u2_lat) / 2; const mLn = (s.u1_lng + s.u2_lng) / 2;
            const url = `https://api.mapbox.com/search/geocode/v6/forward?q=cafe&proximity=${mLn},${mLa}&country=AE&access_token=${MAPBOX_TOKEN}`;
            const res = await fetch(url); const d = await res.json();
            const list = document.getElementById('venue-list'); list.innerHTML = '';
            d.features.forEach(f => {
                const card = document.createElement('div'); card.className = 'venue-card';
                card.innerHTML = `<strong>${f.properties.name}</strong>`;
                list.appendChild(card);
            });
            document.getElementById('oracle-ballot').style.display = 'block';
        }

        function triggerSync(s) {
            document.body.style.background = "#0f0";
            setTimeout(() => {
                document.body.style.background = "#000";
                document.getElementById('terminal').style.display = 'none';
                document.getElementById('nav-hud').style.display = 'block';
                document.getElementById('target-name').innerText = `PROCEED TO ${s.selected_venue_name.toUpperCase()}`;
                drawTrails(s);
            }, 1000);
        }

        async function drawTrails(s) {
            const vLoc = [s.selected_lng, s.selected_lat];
            new mapboxgl.Marker({color:'#f00'}).setLngLat(vLoc).addTo(map);
            
            const getRoute = async (start) => {
                const r = await fetch(`https://api.mapbox.com/directions/v5/mapbox/walking/${start.lng},${start.lat};${vLoc[0]},${vLoc[1]}?geometries=geojson&access_token=${MAPBOX_TOKEN}`);
                const res = await r.json();
                if(!res.routes || res.routes.length === 0) throw new Error("No route found");
                return res;
            };

            try {
                const routeMe = await getRoute(myLoc); 
                const routePeer = await getRoute(peerLoc);
                
                renderLayer('my-trail', routeMe.routes[0].geometry, '#0f0');
                renderLayer('peer-trail', routePeer.routes[0].geometry, '#0a0');
                
                document.getElementById('eta-display').innerText = `YOU: ${Math.round(routeMe.routes[0].duration/60)} MIN | PEER: ${Math.round(routePeer.routes[0].duration/60)} MIN`;
                
                const bounds = new mapboxgl.LngLatBounds().extend([myLoc.lng, myLoc.lat]).extend([peerLoc.lng, peerLoc.lat]).extend(vLoc);
                map.fitBounds(bounds, { padding: 50, pitch: 45, duration: 2500 });
            } catch (e) {
                console.error("TRAIL_ERROR:", e);
            }
        }

        function renderLayer(id, geo, color) {
            if (map.getSource(id)) {
                map.removeLayer(id);
                map.removeSource(id);
            }
            map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: geo } });
            map.addLayer({ 
                id, 
                type: 'line', 
                source: id, 
                paint: { 'line-color': color, 'line-width': 6, 'line-opacity': 0.8 } 
            });
        }
        setInterval(scan, 5000); scan();
    </script>
</body>
</html>
