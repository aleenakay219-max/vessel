<!DOCTYPE html>
<html>
<head>
    <title>Creator</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        #map { height: 100vh; width: 100vw; }
        #status { position: absolute; top: 20px; left: 20px; z-index: 100; background: #000; padding: 15px; border: 2px solid #0f0; }
    </style>
</head>
<body>
    <div id="status">CLICK MAP TO DEPLOY</div>
    <div id="map"></div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "sb_secret_hs-PNPi09SXyVbrSbbYJHg_5wSiF71X");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });

        map.on('click', async (e) => {
            console.log("Click detected at:", e.lngLat);
            try {
                const { data, error } = await _supabase.from('nodes').insert([{ lat: e.lngLat.lat, lng: e.lngLat.lng, status: 'active' }]).select();

                if (error) {
                    alert("Supabase Error: " + error.message);
                    return;
                }

                const id = data[0].id;
                document.getElementById('status').innerText = "LIVE ID: " + id;
                new mapboxgl.Marker({color: '#0f0'}).setLngLat(e.lngLat).addTo(map);

                setInterval(async () => {
                    const { data: node } = await _supabase.from('nodes').select('status').eq('id', id).single();
                    if (node && node.status === 'bridged') {
                        document.body.innerHTML = "<h1 style='color:#0f0; text-align:center; margin-top:20%;'>[ BRIDGE ESTABLISHED ]</h1>";
                    }
                }, 2000);

            } catch (err) {
                alert("Critical Error: " + err.message);
            }
        });
    </script>
</body>
</html>
