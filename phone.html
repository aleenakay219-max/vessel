<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VESSEL | SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #0f0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .marker { padding: 8px; background: #000; border: 1px solid #0f0; }
        #challenge { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .vibe-btn { width: 100%; padding: 15px; margin: 10px 0; background: transparent; color: #0f0; border: 1px solid #0f0; font-size: 16px; font-family: monospace; }
        #terminal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border: 1px solid #030; max-width: 85%; }
        .msg.me { align-self: flex-end; border-color: #0f0; }
        .msg.them { align-self: flex-start; background: #010; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #0f0; }
        #chat-in { flex: 1; background: #000; border: 1px solid #030; color: #0f0; padding: 12px; outline: none; font-size: 16px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="challenge">
        <h2 id="q-text"></h2>
        <button class="vibe-btn" id="btn-a" onclick="answer(0)"></button>
        <button class="vibe-btn" id="btn-b" onclick="answer(1)"></button>
    </div>
    <div id="terminal">
        <div id="msg-box"></div>
        <div class="input-area">
            <input type="text" id="chat-in" placeholder="TYPE...">
            <button onclick="sendMsg()" style="background:#0f0; border:none; padding:10px; font-family:monospace; font-weight:bold;">SEND</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        
        const myUserId = "STRANGER_" + Math.random().toString(36).substr(2, 5);
        let currentN = null;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        const templates = { '☕ Coffee': ['Quiet café', 'Loud café'], '💬 Chat': ['Deep talks', 'Small talk'], '🚶 Walk': ['No music', 'Full speaker mode'], '✨ Connect': ['Genuine curiosity', 'Flexing'] };

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            document.querySelectorAll('.marker').forEach(m => m.remove());
            data?.forEach(n => {
                const el = document.createElement('div'); el.className = 'marker'; el.innerText = n.intent;
                el.onclick = () => { currentN = n; document.getElementById('q-text').innerText = n.secret_q; document.getElementById('btn-a').innerText = templates[n.intent][0]; document.getElementById('btn-b').innerText = templates[n.intent][1]; document.getElementById('challenge').style.display = 'flex'; };
                new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
            });
        }

        window.answer = async (i) => {
            const choice = templates[currentN.intent][i];
            if(choice === currentN.secret_a_adx) {
                await _supabase.from('requests').insert([{ node_id: currentN.id, requester_id: myUserId, answer_given: choice, status: 'pending' }]);
                document.getElementById('challenge').innerHTML = "<h2>HANDSHAKE PENDING...</h2><p>Wait for creator to open bridge.</p>";
                const check = setInterval(async () => {
                    const { data } = await _supabase.from('nodes').select('status').eq('id', currentN.id).single();
                    if(data?.status === 'bridged') { clearInterval(check); document.getElementById('challenge').style.display='none'; document.getElementById('terminal').style.display='flex'; startChatSync(); }
                }, 2000);
            }
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `node_id=eq.${currentN.id}` }, p => {
                if(p.new.sender !== myUserId) renderMsg(p.new);
            }).subscribe();
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-in');
            const val = input.value.trim(); if(!val) return;
            renderMsg({ sender: myUserId, content: val });
            await _supabase.from('messages').insert([{ node_id: currentN.id, sender: myUserId, content: val }]);
            input.value = '';
        };

        function renderMsg(m) {
            const box = document.getElementById('msg-box');
            const div = document.createElement('div');
            div.className = `msg ${m.sender === myUserId ? 'me' : 'them'}`;
            div.innerText = m.content;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
        setInterval(scan, 5000);
        scan();
    </script>
</body>
</html>
