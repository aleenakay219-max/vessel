<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; }
        #terminal { display: none; position: fixed; bottom: 10px; left: 5%; width: 90%; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 2000; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #msg-box { height: 150px; overflow-y: auto; color:#0f0; margin-bottom: 10px; border: 1px solid #030; padding: 5px; display: flex; flex-direction: column; }
        #oracle-ballot { display: none; color:#0f0; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); font-size: 11px; }
        #nav-hud { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 10, 0, 0.95); border-top: 2px solid #0f0; z-index: 4000; padding: 20px; text-align: center; color: #0f0; box-sizing: border-box; }
        .hud-btn { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; margin: 10px 5px; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <div id="oracle-ballot">ANALYZING MIDPOINT...</div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none; width:100%; padding:12px; background:transparent; border:1px solid #0f0; color:#0f0; margin-bottom:10px; cursor:pointer;">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;"><input type="text" id="chat-in" placeholder="TYPE..." style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px; outline:none;"><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px; margin-left:5px; cursor:pointer; font-weight:bold;">SEND</button></div>
    </div>
    <div id="nav-hud"><h3 id="target-name" style="margin:0; text-transform:uppercase;">LOCATION SYNCED</h3><div id="eta-display" style="font-size:11px; margin-top:5px;">TRAILS ACTIVE</div><button class="hud-btn" onclick="location.reload()">TERMINATE</button></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://rnroyhkvkmzuichysxnk.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });
        let currentN = null, myLoc = null, activeMarkers = [];

        navigator.geolocation.watchPosition(p => { 
            myLoc = {lat: p.coords.latitude, lng: p.coords.longitude}; 
        }, null, {enableHighAccuracy:true});

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            activeMarkers.forEach(m => m.remove());
            activeMarkers = [];
            data?.forEach(n => {
                const el = document.createElement('div'); el.style.cssText = "color:#0f0; background:#000; border:1px solid #0f0; padding:5px; font-size:10px; cursor:pointer;"; el.innerText = "[ NODE ]";
                
                // ✅ Fix 3: Marker click (prevent duplicate subscriptions)
                el.onclick = async () => {
                    if (currentN) return; 
                    currentN = n;
                    console.log("Joining node:", n.id);
                    await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync();
                    startOracleLive();
                };
                const m = new mapboxgl.Marker(el).setLngLat([parseFloat(n.lng), parseFloat(n.lat)]).addTo(map);
                activeMarkers.push(m);
            });
        }

        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]);
            document.getElementById('chat-in').value = '';
            document.getElementById('oracle-btn').style.display = 'block';
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => {
                const box = document.getElementById('msg-box');
                box.innerHTML += `<div style="color:#0f0; margin-bottom:5px;">> ${p.new.content}</div>`;
                box.scrollTop = box.scrollHeight;
                document.getElementById('oracle-btn').style.display = 'block';
            }).subscribe();
        }

        // 🔥 Fix 1: initiateOracle() (critical write to u2)
        window.initiateOracle = async () => {
            if (!myLoc) { alert("Location not ready. Wait 2–3 seconds."); return; }
            document.getElementById('oracle-btn').innerText = "[ SENDING LOCATION... ]";
            console.log("SEEKER → writing u2:", myLoc, currentN.id);
            const { error } = await _supabase.from('oracle_sessions').upsert({
                bridge_id: currentN.id, u2_lat: myLoc.lat, u2_lng: myLoc.lng
            }, { onConflict: 'bridge_id' });
            if (error) { console.error("Oracle write failed:", error); }
            document.getElementById('oracle-btn').innerText = "[ WAITING FOR MATCH... ]";
        };

        // ✅ Fix 2: REPLACE startOracleLive() (Removed Polling)
        function startOracleLive() {
            let handled = false;
            _supabase
            .channel('oracle-live-' + currentN.id)
            .on('postgres_changes', {
                event: 'UPDATE', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${currentN.id}`
            }, payload => {
                const s = payload.new;
                console.log("SEEKER received:", s);
                if (s.u1_lat && s.u2_lat && !handled) {
                    handled = true;
                    document.getElementById('oracle-ballot').style.display = 'block';
                    document.getElementById('oracle-ballot').innerText = "ORACLE READY...";
                }
                if (s.status === 'matched') { triggerSync(s); }
            })
            .subscribe();
        }

        // 🔥 Fix 5: HARDEN triggerSync()
        function triggerSync(s) {
            if (!myLoc) { alert("Location missing"); return; }
            console.log("MATCHED:", s);
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('nav-hud').style.display = 'block';
            document.getElementById('target-name').innerText = `PROCEED TO ${s.selected_venue_name.toUpperCase()}`;
            drawRoute('routeA', parseFloat(s.u1_lng), parseFloat(s.u1_lat), s.selected_lng, s.selected_lat);
            drawRoute('routeB', myLoc.lng, myLoc.lat, s.selected_lng, s.selected_lat);
            const bounds = new mapboxgl.LngLatBounds()
                .extend([myLoc.lng, myLoc.lat])
                .extend([parseFloat(s.u1_lng), parseFloat(s.u1_lat)])
                .extend([s.selected_lng, s.selected_lat]);
            map.fitBounds(bounds, { padding: 50, pitch: 45, duration: 2000 });
        }

        async function drawRoute(id, fLng, fLat, tLng, tLat) {
            const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${fLng},${fLat};${tLng},${tLat}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;
            const res = await fetch(url); const data = await res.json();
            const route = data.routes[0].geometry;
            if (map.getSource(id)) { map.removeLayer(id); map.removeSource(id); }
            map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: route } });
            map.addLayer({ id, type: 'line', source: id, paint: { 'line-color': id === 'routeA' ? '#0a0' : '#0f0', 'line-width': 8 } });
        }

        setInterval(scan, 5000); 
        scan();
    </script>
</body>
</html>
