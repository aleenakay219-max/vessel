<html lang="en">

    <meta charset="UTF-8">
    <title>VESSEL | CREATOR</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">

        #inbox-panel{display:none;border:1px solid #FFD700;padding:10px;margin-bottom:10px;max-height:200px;overflow-y:auto;color:#FFD700}
        #msg-box{height:150px;overflow-y:auto;color:#FFD700;margin-bottom:10px;border:1px solid #332200;padding:5px;display:flex;flex-direction:column}
        .chat-msg{max-width:80%;padding:8px 12px;margin:4px 0;border-radius:8px;word-wrap:break-word;font-size:13px;line-height:1.4}
        .msg-left{align-self:flex-start;background:#111;border:1px solid #FFD700;color:#FFD700}
        .msg-right{align-self:flex-end;background:#FFD700;color:#000;border:1px solid #FFD700}
        #oracle-ballot{display:none;color:#FFD700;border:1px solid #FFD700;padding:10px;margin-bottom:10px;background:rgba(255,215,0,0.1);font-size:11px;text-align:center}
        #sync-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #FFD700;z-index:5000;padding:30px;text-align:center;color:#FFD700}
        #rate-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #FFD700;z-index:5000;padding:30px;text-align:center;color:#FFD700}
        #nav-hud{display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(0,10,0,0.95);border-top:2px solid #FFD700;z-index:4000;padding:20px;text-align:center;color:#FFD700;box-sizing:border-box}
        #fab{position:absolute;bottom:30px;right:30px;width:70px;height:70px;background:#000;border:2px solid #FFD700;border-radius:50%;color:#FFD700;font-size:35px;cursor:pointer;z-index:2000;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px #FFD700}
        #profile-gear{position:absolute;top:20px;left:20px;width:36px;height:36px;background:#000;border:2px solid #FFD700;border-radius:50%;color:#FFD700;font-size:20px;cursor:pointer;z-index:2000;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px #FFD700}
        #profile-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,10,0,0.97);border:2px solid #FFD700;z-index:6000;padding:20px;color:#FFD700;width:85%;max-width:320px;box-sizing:border-box}
        #profile-panel label{display:block;margin:10px 0 4px;font-size:12px}
        #profile-panel input, #profile-panel select{width:100%;padding:8px;background:#000;border:1px solid #FFD700;color:#FFD700;font-family:monospace;margin-bottom:5px}
        .profile-save-btn{background:#FFD700;color:#000;border:none;padding:10px;margin-top:10px;width:100%;cursor:pointer;font-family:monospace}
        .profile-close-btn{background:transparent;border:1px solid #f00;color:#f00;padding:8px;margin-top:8px;width:100%;cursor:pointer;font-family:monospace}
        #intent-panel{display:none;position:fixed;bottom:110px;left:5%;width:90%;background:rgba(0,10,0,0.97);border:2px solid #FFD700;z-index:5000;padding:0;box-sizing:border-box;max-height:60vh;overflow-y:auto}
        .accordion-section{border-bottom:1px solid #FFD700}
        .accordion-header{width:100%;background:transparent;border:none;color:#FFD700;padding:12px 15px;text-align:left;font-family:monospace;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .accordion-header:hover{background:rgba(255,215,0,0.05)}
        .accordion-body{display:none;padding:0 15px 12px}
        .accordion-body.open{display:block}
        .btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
        .intent-btn{background:transparent;border:1px solid #FFD700;color:#FFD700;padding:8px 12px;cursor:pointer;font-family:monospace;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap}
        .intent-btn:hover,.intent-btn.selected{background:#FFD700;color:#000}
        .intent-btn.custom{border-style:dashed}
        .node-type-row{margin:8px 0;display:flex;gap:10px;align-items:center}
        .vibe-row{margin:8px 0}
        .vibe-option{background:transparent;border:1px solid #FFD700;color:#FFD700;padding:5px 10px;cursor:pointer;font-family:monospace;font-size:11px;margin-right:5px}
        .vibe-option.selected{background:#FFD700;color:#000}
        .custom-input{width:100%;padding:8px;background:#000;border:1px solid #FFD700;color:#FFD700;margin-top:5px;font-family:monospace;font-size:12px;display:none}
        .done-btn{display:none;margin-top:8px;background:#FFD700;color:#000;border:none;padding:8px 16px;cursor:pointer;font-family:monospace}
        .close-btn{display:block;width:100%;background:transparent;border:none;border-top:1px solid #f00;color:#f00;padding:12px;text-align:center;font-family:monospace;cursor:pointer}
        .hud-btn{background:transparent;border:1px solid #FFD700;color:#FFD700;padding:12px;margin:10px 5px;cursor:pointer;font-family:monospace;text-transform:uppercase}
        .sync-btn{background:transparent;border:2px solid #FFD700;color:#FFD700;padding:15px 30px;cursor:pointer;font-family:monospace;font-size:16px;margin:10px}
        .rate-btn{background:transparent;border:2px solid #FFD700;color:#FFD700;padding:15px 25px;cursor:pointer;font-family:monospace;font-size:24px;margin:10px}
        .inbox-item{display:flex;align-items:center;margin-bottom:8px;padding:8px;border:1px solid #FFD700}
        .inbox-item .avatar{font-size:28px;margin-right:10px}
        .inbox-item .info{flex:1;font-size:12px}
        .inbox-item .info .name{color:#FFD700;font-size:14px}
        .inbox-item .info .detail{color:#aaa}
        .inbox-actions button{margin-left:5px;background:transparent;border:1px solid #FFD700;color:#FFD700;cursor:pointer;padding:5px 10px}
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="status-bar"></div>
    <button id="profile-gear" onclick="openProfilePanel()" title="Profile">⚙️</button>
    <div id="profile-panel">
        <h3 style="margin-top:0;text-align:center">YOUR PROFILE</h3>
        <label>Display Name</label>
        <input type="text" id="prof-name" placeholder="Your public name">
        <label>Avatar Emoji</label>
        <input type="text" id="prof-emoji" placeholder="🤖" maxlength="2">
        <label>Age</label>
        <input type="number" id="prof-age" placeholder="25" min="13" max="120">
        <label>Nationality</label>
        <input type="text" id="prof-nationality" placeholder="e.g. Indian, Emirati">
        <label>Profession</label>
        <input type="text" id="prof-profession" placeholder="e.g. Designer, Student">
        <label>Vibe Tags (comma separated)</label>
        <input type="text" id="prof-tags" placeholder="e.g. Creative, Night Owl">
        <button class="profile-save-btn" onclick="saveProfile()">SAVE</button>
        <button class="profile-close-btn" onclick="closeProfilePanel()">CLOSE</button>
    </div>
    <button id="fab" onclick="openIntentPanel()">+</button>
    <div id="intent-panel"></div>
    <div id="terminal">
        <div id="inbox-panel"></div>
        <div id="oracle-ballot">STATUS: PENDING</div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none;width:100%;padding:12px;background:transparent;border:1px solid #FFD700;color:#FFD700;margin-bottom:10px;cursor:pointer">[ SYNC GPS WITH ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex">
            <input type="text" id="chat-in" placeholder="TYPE..." onkeypress="if(event.key==='Enter')sendMsg()" style="flex:1;background:#000;border:1px solid #FFD700;color:#FFD700;padding:10px;outline:none">
            <button onclick="sendMsg()" style="background:#FFD700;color:#000;border:none;padding:10px;margin-left:5px;cursor:pointer;font-weight:bold">SEND</button>
        </div>
    </div>
    <div id="sync-panel">
        <h2>VENUE LOCKED</h2>
        <p id="sync-venue"></p>
        <p id="sync-status">Waiting for both users to confirm...</p>
        <button class="sync-btn" id="sync-confirm-btn" onclick="confirmProceed()">[ CONFIRM & PROCEED ]</button>
    </div>
    <div id="rate-panel">
        <h2>MEET COMPLETE</h2>
        <p>How was your experience?</p>
        <button class="rate-btn" onclick="submitRating(1)">👍</button>
        <button class="rate-btn" onclick="submitRating(-1)">👎</button>
    </div>
    <div id="nav-hud">
        <h3 id="target-name">MATCHED</h3>
        <p id="meet-timer"></p>
        <button class="hud-btn" onclick="location.reload()">TERMINATE</button>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const MAX_VENUE_DISTANCE_KM = 20, NODE_EXPIRY_MINUTES = 30;
        const params = new URLSearchParams(window.location.search);
        const MEET_DURATION_MINUTES = params.get('debug') ? parseInt(params.get('debug')) : 25;

        const categories = {
            social: { label:'🍻 Social', presets:['☕ Coffee & Conversation','🍽️ Foodie Meetup','🌙 Night Out','📸 Social Collab'] },
            games: { label:'⚽ Games', presets:['⚽ Football','🏏 Cricket','🎾 Tennis'] },
            work: { label:'🔧 Work', presets:['🔨 I Can Help','☕ Co‑Working / Study'] },
            parents: { label:'🧒 Parents', presets:['🧸 Kids’ Playdate','🤱 Mum2Mum','👨 Dad’s Crew','👨‍👩‍👧 Family Hangout'] }
        };
        const vibeChecks = {
            '☕ Coffee & Conversation': {q:'What kind of coffee vibe?', a:'Loud & social', b:'Quiet & intimate'},
            '🍽️ Foodie Meetup': {q:'What cuisine mood?', a:'Adventurous / new', b:'Comfort / familiar'},
            '🌙 Night Out': {q:'Tonight feels like…', a:'Dancing & energy', b:'Deep talk over drinks'},
            '📸 Social Collab': {q:'What type of content?', a:'Video / Reels', b:'Photography'}
        };

        let selectedCategory = 'social';
        let selectedIntent = '☕ Coffee & Conversation';
        let customIntentText = '';
        let selectedNodeType = 'one_on_one';
        let selectedMaxParticipants = null;
        let selectedVibeAnswer = null;

        let myUserId = localStorage.getItem('vessel_user_id');
        if (!myUserId) { myUserId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('vessel_user_id', myUserId); }

        const map = new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[55.39,25.34],zoom:12});
        let currentN = null, myLoc = {lat:0,lng:0}, oracleProcessed = false, gpsReady = false, gpsFailures = 0, meetRated = false, myConfirmed = false, meetTimerInterval = null;
        let selectedVenueCoords = null;

        function setStatus(t,m){const b=document.getElementById('status-bar');const c={info:'#FFD700',warning:'#f90',error:'#f00',success:'#FFD700'};b.style.display='block';b.style.borderColor=c[t]||'#FFD700';b.style.color=c[t]||'#FFD700';b.innerText=m}
        function clearStatus(){document.getElementById('status-bar').style.display='none'}
        navigator.geolocation.watchPosition(p=>{myLoc={lat:p.coords.latitude,lng:p.coords.longitude};gpsReady=true;gpsFailures=0;clearStatus()},e=>{gpsFailures++;gpsReady=false;if(gpsFailures===1)setStatus('warning','GPS signal weak');if(gpsFailures>5)setStatus('error','GPS unavailable')},{enableHighAccuracy:true,timeout:15000,maximumAge:30000});
        setStatus('info','Waiting for GPS...');

        function haversine(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
        function bbox(midLat,midLng,r){const dLat=r/111.32,dLng=r/(111.32*Math.cos(midLat*Math.PI/180));return (midLng-dLng)+','+(midLat-dLat)+','+(midLng+dLng)+','+(midLat+dLat)}
        async function ensureUser(){const{data}=await _supabase.from('users').select('id').eq('id',myUserId).limit(1);if(!data||data.length===0)await _supabase.from('users').insert([{id:myUserId,trust_score:5.0,total_meets:0}]);}
        ensureUser();

        // Profile functions (unchanged)
        window.openProfilePanel = async () => {
            document.getElementById('profile-panel').style.display = 'block';
            const { data, error } = await _supabase.from('users').select('display_name, avatar_emoji, age, nationality, profession, vibe_tags').eq('id', myUserId).single();
            if (data) {
                document.getElementById('prof-name').value = data.display_name || '';
                document.getElementById('prof-emoji').value = data.avatar_emoji || '🤖';
                document.getElementById('prof-age').value = data.age || '';
                document.getElementById('prof-nationality').value = data.nationality || '';
                document.getElementById('prof-profession').value = data.profession || '';
                document.getElementById('prof-tags').value = (data.vibe_tags || []).join(', ');
            }
        };
        function closeProfilePanel() { document.getElementById('profile-panel').style.display = 'none'; }
        window.saveProfile = async () => {
            const displayName = document.getElementById('prof-name').value.trim();
            const avatarEmoji = document.getElementById('prof-emoji').value.trim() || '🤖';
            const age = parseInt(document.getElementById('prof-age').value) || null;
            const nationality = document.getElementById('prof-nationality').value.trim();
            const profession = document.getElementById('prof-profession').value.trim();
            const tagsRaw = document.getElementById('prof-tags').value;
            const vibeTags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];

            const { error } = await _supabase.from('users').upsert({
                id: myUserId,
                display_name: displayName,
                avatar_emoji: avatarEmoji,
                age: age,
                nationality: nationality || null,
                profession: profession || null,
                vibe_tags: vibeTags,
                trust_score: 5.0,
                total_meets: 0
            }, { onConflict: 'id' });

            if (error) { alert('Failed to save profile: ' + error.message); }
            else { closeProfilePanel(); setStatus('success', 'Profile updated!'); setTimeout(() => clearStatus(), 2000); }
        };

        // Build accordion (unchanged from previous working version)
        function buildAccordion(){
            const panel = document.getElementById('intent-panel');
            panel.innerHTML = '';
            Object.keys(categories).forEach(cat => {
                const section = document.createElement('div');
                section.className = 'accordion-section';
                const header = document.createElement('button');
                header.className = 'accordion-header';
                header.innerHTML = `<span>${categories[cat].label}</span><span>▼</span>`;
                header.onclick = () => toggleAccordion(cat);
                const body = document.createElement('div');
                body.className = 'accordion-body';
                body.id = 'body-' + cat;

                const btnRow = document.createElement('div');
                btnRow.className = 'btn-row';
                categories[cat].presets.forEach(intent => {
                    const btn = document.createElement('button');
                    btn.className = 'intent-btn';
                    btn.innerText = intent;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        selectIntent(cat, intent, false);
                        document.getElementById('done-btn-' + cat).style.display = 'inline-block';
                    };
                    btnRow.appendChild(btn);
                });
                const customBtn = document.createElement('button');
                customBtn.className = 'intent-btn custom';
                customBtn.innerText = '+ Custom';
                customBtn.onclick = (e) => {
                    e.stopPropagation();
                    selectIntent(cat, null, true);
                    document.getElementById('custom-' + cat).style.display = 'block';
                    document.getElementById('done-btn-' + cat).style.display = 'inline-block';
                };
                btnRow.appendChild(customBtn);
                body.appendChild(btnRow);

                const typeRow = document.createElement('div');
                typeRow.className = 'node-type-row';
                typeRow.innerHTML = '<span style="color:#FFD700;font-size:12px">Type:</span>';
                ['one_on_one','group'].forEach(type => {
                    const typeBtn = document.createElement('button');
                    typeBtn.className = 'intent-btn';
                    typeBtn.innerText = type === 'one_on_one' ? '🔒 1‑on‑1' : '👥 Group';
                    typeBtn.onclick = (e) => {
                        e.stopPropagation();
                        selectedNodeType = type;
                        document.querySelectorAll('#body-' + cat + ' .node-type-row .intent-btn').forEach(b => b.classList.remove('selected'));
                        typeBtn.classList.add('selected');
                        if (type === 'group') {
                            document.getElementById('max-part-' + cat).style.display = 'inline-block';
                            const vibeRow = document.getElementById('vibe-row-' + cat);
                            if (vibeRow) vibeRow.style.display = 'none';
                        } else {
                            document.getElementById('max-part-' + cat).style.display = 'none';
                            if (cat === 'social' && selectedIntent !== 'Custom' && vibeChecks[selectedIntent]) {
                                const vibeRow = document.getElementById('vibe-row-' + cat);
                                if (vibeRow) vibeRow.style.display = 'block';
                            }
                        }
                    };
                    typeRow.appendChild(typeBtn);
                });
                const maxInput = document.createElement('input');
                maxInput.type = 'number'; maxInput.min = 2; maxInput.max = 20; maxInput.placeholder = 'Max (opt)';
                maxInput.className = 'custom-input'; maxInput.id = 'max-part-' + cat; maxInput.style.width = '60px'; maxInput.style.display = 'none';
                maxInput.onchange = () => selectedMaxParticipants = maxInput.value ? parseInt(maxInput.value) : null;
                typeRow.appendChild(maxInput);
                body.appendChild(typeRow);

                if (cat === 'social') {
                    const vibeRow = document.createElement('div');
                    vibeRow.className = 'vibe-row';
                    vibeRow.id = 'vibe-row-' + cat;
                    vibeRow.style.display = 'none';
                    body.appendChild(vibeRow);
                }

                const customInput = document.createElement('input');
                customInput.className = 'custom-input';
                customInput.id = 'custom-' + cat;
                customInput.placeholder = 'Describe your ' + categories[cat].label.split(' ')[1] + ' intent...';
                customInput.oninput = (e) => { customIntentText = e.target.value; };
                const doneBtn = document.createElement('button');
                doneBtn.className = 'done-btn';
                doneBtn.id = 'done-btn-' + cat;
                doneBtn.innerText = 'DONE';
                doneBtn.onclick = () => { closeIntentPanel(); startCreation(); };
                body.appendChild(customInput);
                body.appendChild(doneBtn);
                section.appendChild(header);
                section.appendChild(body);
                panel.appendChild(section);
            });
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-btn';
            closeBtn.innerText = 'CLOSE';
            closeBtn.onclick = closeIntentPanel;
            panel.appendChild(closeBtn);
        }
        buildAccordion();

        function toggleAccordion(cat) {
            document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
            document.getElementById('body-' + cat).classList.toggle('open');
        }
        function collapseAll() { document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open')); }

        function selectIntent(cat, intent, isCustom) {
            selectedCategory = cat;
            if (isCustom) {
                selectedIntent = 'Custom';
                customIntentText = '';
                document.querySelectorAll('.custom-input').forEach(i => i.style.display = 'none');
                document.getElementById('custom-' + cat).style.display = 'block';
                const vibeRow = document.getElementById('vibe-row-' + cat);
                if (vibeRow) vibeRow.style.display = 'none';
                selectedVibeAnswer = null;
            } else {
                selectedIntent = intent;
                customIntentText = '';
                document.querySelectorAll('.custom-input').forEach(i => i.style.display = 'none');
                if (cat === 'social' && selectedNodeType === 'one_on_one' && vibeChecks[intent]) {
                    const vibeRow = document.getElementById('vibe-row-' + cat);
                    if (vibeRow) {
                        vibeRow.style.display = 'block';
                        const ck = vibeChecks[intent];
                        vibeRow.innerHTML = `<span style="color:#FFD700;font-size:12px">Vibe: ${ck.q}</span><br>
                            <button class="vibe-option" data-vibe="a">${ck.a}</button>
                            <button class="vibe-option" data-vibe="b">${ck.b}</button>`;
                        vibeRow.querySelectorAll('.vibe-option').forEach(btn => {
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                vibeRow.querySelectorAll('.vibe-option').forEach(b => b.classList.remove('selected'));
                                btn.classList.add('selected');
                                selectedVibeAnswer = btn.dataset.vibe;
                            };
                        });
                    }
                } else {
                    const vibeRow = document.getElementById('vibe-row-' + cat);
                    if (vibeRow) vibeRow.style.display = 'none';
                    selectedVibeAnswer = null;
                }
            }
            document.querySelectorAll('.intent-btn').forEach(b => b.classList.remove('selected'));
            if (!isCustom) {
                document.getElementById('body-' + cat).querySelectorAll('.intent-btn').forEach(b => { if (b.innerText === intent) b.classList.add('selected'); });
            }
        }

        window.openIntentPanel = () => {
            if (!gpsReady) { setStatus('warning', 'GPS not ready'); return; }
            document.getElementById('intent-panel').style.display = 'block';
        };
        function closeIntentPanel() { document.getElementById('intent-panel').style.display = 'none'; collapseAll(); }

        // Node creation with vibe validation
        window.startCreation = () => {
            const finalIntent = selectedIntent === 'Custom' ? customIntentText : selectedIntent;
            if (!finalIntent.trim()) { setStatus('error', 'Please select or enter an intent'); return; }
            const vibeRow = document.getElementById('vibe-row-social');
            if (selectedCategory === 'social' && selectedNodeType === 'one_on_one' && vibeRow && vibeRow.style.display !== 'none' && !selectedVibeAnswer) {
                setStatus('error', 'Please select a vibe before dropping');
                return;
            }
            closeIntentPanel();
            setStatus('info', 'Tap anywhere on the map to drop your "' + finalIntent + '" node');

            map.once('click', async (e) => {
                setStatus('info', 'Creating node...');
                const nodeData = {
                    lat: e.lngLat.lat, lng: e.lngLat.lng, intent: finalIntent, category: selectedCategory,
                    node_type: selectedNodeType, max_participants: selectedNodeType === 'group' ? selectedMaxParticipants : null,
                    status: 'active', user_id: myUserId,
                    expires_at: new Date(Date.now() + NODE_EXPIRY_MINUTES * 60 * 1000).toISOString()
                };
                if (selectedCategory === 'social' && selectedNodeType === 'one_on_one' && selectedVibeAnswer && vibeChecks[selectedIntent]) {
                    nodeData.vibe_question = vibeChecks[selectedIntent].q;
                    nodeData.vibe_answer = selectedVibeAnswer;
                }
                const { data, error } = await _supabase.from('nodes').insert([nodeData]).select();
                if (error) { setStatus('error', 'Failed to create node: ' + error.message); return; }
                currentN = data[0];
                clearStatus(); setStatus('success', '"' + finalIntent + '" node active! ' + NODE_EXPIRY_MINUTES + ' mins.');
                new mapboxgl.Marker({ color: '#FFD700' }).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map);

                _supabase.channel('reqs-' + currentN.id)
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'requests', filter: 'node_id=eq.' + currentN.id }, () => {
                        clearStatus(); setStatus('success', 'Someone wants to connect!');
                        document.getElementById('terminal').style.display = 'flex';
                        loadInbox();
                    }).subscribe();

                const poll = setInterval(async () => {
                    if (document.getElementById('terminal').style.display === 'flex') { clearInterval(poll); return; }
                    const { data: reqs } = await _supabase.from('requests').select('*').eq('node_id', currentN.id).limit(1);
                    if (reqs && reqs.length > 0) {
                        clearInterval(poll); clearStatus(); setStatus('success', 'Someone wants to connect!');
                        document.getElementById('terminal').style.display = 'flex';
                        loadInbox();
                    }
                }, 3000);
            });
        };

        // Inbox, chat, Oracle, etc. all unchanged (already using #FFD700)

    </script>
