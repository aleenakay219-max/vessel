<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | CREATOR</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: monospace; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Fixed FAB: Larger hit area, higher z-index */
        #fab { position: absolute; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #000; border: 2px solid #0f0; border-radius: 50%; color: #0f0; font-size: 35px; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #0f0; outline: none; }
        
        #terminal { display: none; position: absolute; top: 20px; left: 20px; width: 350px; max-height: 85vh; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 1000; flex-direction: column; padding: 15px; }
        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); color: #0f0; }
        .venue-card { background: rgba(0, 0, 0, 0.95); border: 1px solid #0f0; color: #0f0; padding: 12px; margin-top: 8px; cursor: pointer; font-size: 12px; }
        
        #msg-box { height: 250px; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; color: #0f0; }
        .msg { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #020; }
        .msg.me { color: #0f0; text-align: right; }
        .msg.them { color: #0a0; text-align: left; }
        
        #oracle-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #0f0; color: #0f0; cursor: pointer; margin-bottom: 10px; }
        
        .hud-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; background: rgba(0,0,0,0.95); border: 1px solid #0f0; padding: 25px; width: 300px; text-align: center; color: #0f0; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="fab" onclick="startCreation()">+</button>
    
    <div id="step-category" class="hud-panel">
        <div style="margin-bottom:10px;">SELECT INTENT</div>
        <button class="option-btn" onclick="selectCategory('☕ Coffee')">☕ Coffee</button>
        <button class="option-btn" onclick="selectCategory('🚶 Walk')">🚶 Walk</button>
        <button class="option-btn" onclick="selectCategory('✨ Connect')">✨ Connect</button>
    </div>

    <div id="terminal">
        <div id="oracle-ballot"><div id="venue-list">Ready...</div></div>
        <button id="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <input type="text" id="chat-in" placeholder="TYPE..." onkeypress="if(event.key==='Enter') sendMsg()" style="background:#000; border:1px solid #0f0; color:#0f0; padding:12px; outline:none; font-family:monospace; width:100%; box-sizing:border-box;">
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });
        navigator.geolocation.getCurrentPosition(p => map.setCenter([p.coords.longitude, p.coords.latitude]));

        let nodeData = {}, myNodeId = null;

        window.startCreation = () => {
            console.log("Creation mode active.");
            map.once('click', (e) => {
                nodeData.lat = e.lngLat.lat; nodeData.lng = e.lngLat.lng;
                document.getElementById('step-category').style.display = 'block';
            });
        };

        window.selectCategory = async (cat) => {
            nodeData.intent = cat;
            const { data } = await _supabase.from('nodes').insert([{ lat: nodeData.lat, lng: nodeData.lng, intent: cat, status: 'active' }]).select();
            if(data) {
                myNodeId = data[0].id;
                document.getElementById('step-category').style.display = 'none';
                new mapboxgl.Marker({color: '#0f0'}).setLngLat([nodeData.lng, nodeData.lat]).addTo(map);
                setInterval(checkRequests, 3000);
            }
        };

        async function checkRequests() {
            const { data } = await _supabase.from('requests').select('*').eq('node_id', myNodeId).eq('status', 'pending');
            if(data?.length > 0) approveMatch();
        }

        window.approveMatch = async () => {
            await _supabase.from('nodes').update({ status: 'bridged' }).eq('id', myNodeId);
            document.getElementById('terminal').style.display = 'flex';
            startChatSync(); startOracleSync();
        };

        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            await _supabase.from('messages').insert([{node_id:myNodeId, sender:'BAD_CREATOR', content:val}]);
            document.getElementById('chat-in').value = '';
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${myNodeId}` }, p => {
                const box = document.getElementById('msg-box');
                const isMe = p.new.sender === 'BAD_CREATOR';
                box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${isMe ? '>> ' : '<< '}${p.new.content}</div>`;
                box.scrollTop = box.scrollHeight;
            }).subscribe();
        }

        window.initiateOracle = () => {
            navigator.geolocation.getCurrentPosition(
                async (pos) => { pushOracle(pos.coords.latitude, pos.coords.longitude); },
                () => { 
                    const man = prompt("GPS Blocked. Manual enter (Lat, Lng) to find cafes near you:", "25.34, 55.39");
                    if(man) { const pts = man.split(','); pushOracle(pts[0].trim(), pts[1].trim()); }
                }
            );
        };

        async function pushOracle(la, ln) {
            await _supabase.from('oracle_sessions').upsert({ bridge_id: myNodeId, u1_lat: la, u1_lng: ln }, { onConflict: 'bridge_id' });
            document.getElementById('oracle-btn').innerText = "SYNCING...";
        }

        function startOracleSync() {
            _supabase.channel('oracle-sync').on('postgres_changes', { event:'*', schema:'public', table:'oracle_sessions', filter:`bridge_id=eq.${myNodeId}` }, p => {
                const s = p.new || p.old;
                if(s && s.u1_lat && s.u2_lat) fetchVenues(s.u1_lat, s.u1_lng, s.u2_lat, s.u2_lng);
            }).subscribe();
        }

        async function fetchVenues(la1, ln1, la2, ln2) {
            const mLa = (parseFloat(la1) + parseFloat(la2)) / 2;
            const mLn = (parseFloat(ln1) + parseFloat(ln2)) / 2;
            const term = nodeData.intent?.includes('Coffee') ? 'cafe' : 'park';
            const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${term}.json?proximity=${mLn},${mLa}&access_token=${MAPBOX_TOKEN}`);
            const d = await res.json();
            const list = document.getElementById('venue-list'); list.innerHTML = '';
            d.features.slice(0, 3).forEach(f => {
                const card = document.createElement('div'); card.className = 'venue-card'; card.innerText = f.text.toUpperCase();
                list.appendChild(card);
            });
            document.getElementById('oracle-ballot').style.display = 'block';
        }
    </script>
</body>
</html>
