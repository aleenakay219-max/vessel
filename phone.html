<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .marker { padding: 8px; background: #000; border: 1px solid #0f0; color: #0f0; font-size: 10px; }
        
        /* HUD DESIGN: Floating terminal */
        #terminal { 
            display: none; 
            position: fixed; 
            bottom: 10px; 
            left: 5%; 
            width: 90%; 
            background: rgba(0, 10, 0, 0.9); 
            border: 1px solid #0f0; 
            z-index: 2000; 
            flex-direction: column; 
            padding: 10px; 
            box-sizing: border-box; 
        }

        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); color: #0f0; }
        .venue-card { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; margin-top: 5px; font-size: 13px; }
        
        #msg-box { height: 120px; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; color: #0f0; }
        .msg { margin-bottom: 5px; padding: 5px; font-size: 12px; }
        .msg.me { color: #0f0; text-align: right; }
        .msg.them { color: #0a0; text-align: left; }
        
        #oracle-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <div id="oracle-ballot"><div id="venue-list">Syncing...</div></div>
        <button id="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;"><input type="text" id="chat-in" placeholder="MESSAGE..." style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px;"><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px;">SEND</button></div>
    </div>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        let currentN = null;

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            data?.forEach(n => {
                const el = document.createElement('div'); el.className = 'marker'; el.innerText = n.intent;
                el.onclick = async () => { 
                    currentN = n; await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync(); startOracleSync();
                };
                new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
            });
        }
        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]);
            document.getElementById('msg-box').innerHTML += `<div class="msg me">>> ${val}</div>`;
            document.getElementById('chat-in').value = '';
        };
        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => {
                if(p.new.sender !== 'SEEKER') document.getElementById('msg-box').innerHTML += `<div class="msg them"><< ${p.new.content}</div>`;
            }).subscribe();
        }
        window.initiateOracle = async () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('oracle_sessions').upsert({ bridge_id: currentN.id, u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude }, { onConflict: 'bridge_id' });
                document.getElementById('oracle-btn').innerText = "SYNCING...";
            });
        };
        function startOracleSync() {
            _supabase.channel('oracle-sync').on('postgres_changes', { event:'*', schema:'public', table:'oracle_sessions', filter:`bridge_id=eq.${currentN.id}` }, p => {
                const s = p.new || p.old;
                if(s && s.u1_lat && s.u2_lat) fetchVenues(s.u1_lat, s.u1_lng, s.u2_lat, s.u2_lng);
            }).subscribe();
        }
        async function fetchVenues(la1, ln1, la2, ln2) {
            const mLa = (parseFloat(la1) + parseFloat(la2)) / 2;
            const mLn = (parseFloat(ln1) + parseFloat(ln2)) / 2;
            const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/coffee.json?proximity=${mLn},${mLa}&access_token=${MAPBOX_TOKEN}`);
            const d = await res.json();
            const list = document.getElementById('venue-list'); list.innerHTML = '';
            d.features.slice(0, 3).forEach(f => { 
                const card = document.createElement('div'); card.className = 'venue-card'; card.innerText = `[ ${f.text.toUpperCase()} ]`;
                card.onclick = () => alert("VOTED: " + f.text);
                list.appendChild(card);
            });
            document.getElementById('oracle-ballot').style.display = 'block';
        }
        setInterval(scan, 5000); scan();
    </script>
</body>
</html>
