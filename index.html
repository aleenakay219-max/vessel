<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | CREATOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:monospace}
        #map{height:100%;width:100%;position:absolute;top:0;z-index:1}
        #status-bar{display:none;position:fixed;top:10px;left:5%;width:90%;background:rgba(0,0,0,0.9);border:1px solid #ff0;z-index:3000;padding:10px;text-align:center;color:#ff0;font-size:12px;box-sizing:border-box}
        #terminal{display:none;opacity:0;transition:opacity 0.3s;position:fixed;bottom:10px;left:5%;width:90%;background:rgba(0,10,0,0.95);border:1px solid #0f0;z-index:2000;flex-direction:column;padding:15px;box-sizing:border-box}
        #msg-box{height:150px;overflow-y:auto;color:#0f0;margin-bottom:10px;border:1px solid #030;padding:5px;display:flex;flex-direction:column}
        #oracle-ballot{display:none;color:#0f0;border:1px solid #0f0;padding:10px;margin-bottom:10px;background:rgba(0,255,0,0.1);font-size:11px;text-align:center}
        #sync-panel{display:none;opacity:0;transition:opacity 0.3s;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #0f0;z-index:5000;padding:30px;text-align:center;color:#0f0}
        #rate-panel{display:none;opacity:0;transition:opacity 0.3s;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #ff0;z-index:5000;padding:30px;text-align:center;color:#ff0}
        #nav-hud{display:none;opacity:0;transition:opacity 0.3s;position:fixed;bottom:0;left:0;width:100%;background:rgba(0,10,0,0.95);border-top:2px solid #0f0;z-index:4000;padding:20px;text-align:center;color:#0f0;box-sizing:border-box}
        #instruction-banner{display:none;position:fixed;top:60px;left:5%;width:90%;background:rgba(0,0,0,0.9);border:1px solid #0ff;z-index:3500;padding:12px;text-align:center;color:#0ff;font-size:14px;font-weight:bold;box-sizing:border-box}
        #fab{position:absolute;bottom:30px;right:30px;width:70px;height:70px;background:#000;border:2px solid #0f0;border-radius:50%;color:#0f0;font-size:35px;cursor:pointer;z-index:2000;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px #0f0}
        /* Accordion picker */
        #intent-panel{display:none;position:fixed;bottom:110px;left:5%;width:90%;background:rgba(0,10,0,0.97);border:2px solid #0f0;z-index:5000;padding:0;box-sizing:border-box;max-height:55vh;overflow-y:auto}
        .accordion-section{border-bottom:1px solid #0f0}
        .accordion-header{width:100%;background:transparent;border:none;color:#0f0;padding:12px 15px;text-align:left;font-family:monospace;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .accordion-header:hover{background:rgba(0,255,0,0.05)}
        .accordion-body{display:none;padding:0 15px 12px}
        .accordion-body.open{display:block}
        .btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
        .intent-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:8px 12px;cursor:pointer;font-family:monospace;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap}
        .intent-btn:hover,.intent-btn.selected{background:#0f0;color:#000}
        .intent-btn.custom{border-style:dashed}
        .custom-input{width:100%;padding:8px;background:#000;border:1px solid #0f0;color:#0f0;margin-top:5px;font-family:monospace;font-size:12px;display:none}
        .close-btn{display:block;width:100%;background:transparent;border:none;border-top:1px solid #f00;color:#f00;padding:12px;text-align:center;font-family:monospace;cursor:pointer}
        .hud-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:12px;margin:10px 5px;cursor:pointer;font-family:monospace;text-transform:uppercase}
        .sync-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 30px;cursor:pointer;font-family:monospace;font-size:16px;margin:10px}
        .rate-btn{background:transparent;border:2px solid #ff0;color:#ff0;padding:15px 25px;cursor:pointer;font-family:monospace;font-size:24px;margin:10px}
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="status-bar"></div>
    <div id="instruction-banner"></div>
    <button id="fab" onclick="openIntentPanel()">+</button>
    <div id="intent-panel"></div>
    <div id="terminal">
        <div id="oracle-ballot">STATUS: PENDING</div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none;width:100%;padding:12px;background:transparent;border:1px solid #0f0;color:#0f0;margin-bottom:10px;cursor:pointer">[ SYNC GPS WITH ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex">
            <input type="text" id="chat-in" placeholder="TYPE..." onkeypress="if(event.key==='Enter')sendMsg()" style="flex:1;background:#000;border:1px solid #0f0;color:#0f0;padding:10px;outline:none">
            <button onclick="sendMsg()" style="background:#0f0;color:#000;border:none;padding:10px;margin-left:5px;cursor:pointer;font-weight:bold">SEND</button>
        </div>
    </div>
    <div id="sync-panel">
        <h2>VENUE LOCKED</h2>
        <p id="sync-venue"></p>
        <p id="sync-status">Waiting for both users to confirm...</p>
        <button class="sync-btn" id="sync-confirm-btn" onclick="confirmProceed()">[ CONFIRM & PROCEED ]</button>
    </div>
    <div id="rate-panel">
        <h2>MEET COMPLETE</h2>
        <p>How was your experience?</p>
        <button class="rate-btn" onclick="submitRating(1)">👍</button>
        <button class="rate-btn" onclick="submitRating(-1)">👎</button>
    </div>
    <div id="nav-hud">
        <h3 id="target-name">MATCHED</h3>
        <p id="meet-timer"></p>
        <button class="hud-btn" id="nav-btn" onclick="startNavigation()" style="display:none">[ NAVIGATE ]</button>
        <button class="hud-btn" onclick="location.reload()">TERMINATE</button>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const MAX_VENUE_DISTANCE_KM=20, NODE_EXPIRY_MINUTES=30;
        const params=new URLSearchParams(window.location.search);
        const MEET_DURATION_MINUTES=params.get('debug')?parseInt(params.get('debug')):25;

        const categoryMeta={
            social:{label:'🍻 Social',color:'#FFD700',emoji:'🍻',queries:['cafe','coffee shop','restaurant','rooftop lounge','park']},
            games:{label:'⚽ Games',color:'#4ADE80',emoji:'🎮',queries:['park','sports complex','field','recreation centre']},
            work:{label:'🔧 Work',color:'#FF8C42',emoji:'🔧',queries:['coworking space','cafe','library','community centre']},
            parents:{label:'🧒 Parents',color:'#C084FC',emoji:'🧒',queries:['playground','family restaurant','indoor play area','park']}
        };
        const presets={
            social:['☕ Coffee & Conversation','🍽️ Foodie Meetup','🌙 Night Out','🧘 Chill & Wellness'],
            games:['⚽ Football','🏏 Cricket','🎾 Tennis'],
            work:['🔨 I Can Help','☕ Co‑Working / Study','💡 Creative Collab'],
            parents:['🧸 Kids’ Playdate','🤱 Mum2Mum','👨 Dad’s Crew','👨‍👩‍👧 Family Hangout']
        };

        let selectedCategory='social', selectedIntent='☕ Coffee & Conversation', customIntentText='';
        let myUserId=localStorage.getItem('vessel_user_id')||(myUserId='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),localStorage.setItem('vessel_user_id',myUserId),myUserId);
        const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/dark-v11',center:[55.39,25.34],zoom:12});
        let currentN=null,myLoc={lat:0,lng:0},oracleProcessed=false,gpsReady=false,gpsFailures=0,meetRated=false,myConfirmed=false,meetTimerInterval=null;
        let navActive=false,routeSteps=[],currentStep=0,navWatchId=null,selectedVenueCoords=null;

        function setStatus(t,m){const b=document.getElementById('status-bar');const c={info:'#ff0',warning:'#f90',error:'#f00',success:'#0f0'};b.style.display='block';b.style.borderColor=c[t]||'#ff0';b.style.color=c[t]||'#ff0';b.innerText=m}
        function clearStatus(){document.getElementById('status-bar').style.display='none'}
        navigator.geolocation.watchPosition(p=>{myLoc={lat:p.coords.latitude,lng:p.coords.longitude};gpsReady=true;gpsFailures=0;clearStatus()},e=>{gpsFailures++;gpsReady=false;if(gpsFailures===1)setStatus('warning','GPS signal weak');if(gpsFailures>5)setStatus('error','GPS unavailable')},{enableHighAccuracy:true,timeout:15000,maximumAge:30000});
        setStatus('info','Waiting for GPS...');

        function haversine(lat1,lng1,lat2,lng2){const R=6371;const dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
        function bbox(midLat,midLng,r){const dLat=r/111.32,dLng=r/(111.32*Math.cos(midLat*Math.PI/180));return (midLng-dLng)+','+(midLat-dLat)+','+(midLng+dLng)+','+(midLat+dLat)}
        async function ensureUser(){const{data}=await _supabase.from('users').select('id').eq('id',myUserId).limit(1);if(!data||data.length===0)await _supabase.from('users').insert([{id:myUserId,trust_score:5.0,total_meets:0}])}
        ensureUser();

        // Build accordion panel
        function buildAccordion(){
            const panel=document.getElementById('intent-panel');
            panel.innerHTML='';
            const categories=['social','games','work','parents'];
            categories.forEach(cat=>{
                const section=document.createElement('div');
                section.className='accordion-section';
                // Header
                const header=document.createElement('button');
                header.className='accordion-header';
                header.innerHTML=`<span>${categoryMeta[cat].label}</span><span>▼</span>`;
                header.onclick=()=>toggleAccordion(cat);
                // Body
                const body=document.createElement('div');
                body.className='accordion-body';
                body.id='body-'+cat;
                const btnRow=document.createElement('div');
                btnRow.className='btn-row';
                presets[cat].forEach(intent=>{
                    const btn=document.createElement('button');
                    btn.className='intent-btn';
                    btn.innerText=intent;
                    btn.onclick=(e)=>{e.stopPropagation();selectIntent(cat,intent,false);collapseAll();closeIntentPanel();startCreation();};
                    btnRow.appendChild(btn);
                });
                // Custom button
                const customBtn=document.createElement('button');
                customBtn.className='intent-btn custom';
                customBtn.innerText='+ Custom';
                customBtn.onclick=(e)=>{e.stopPropagation();selectIntent(cat,null,true);openCustomInput(cat);};
                btnRow.appendChild(customBtn);
                // Custom input
                const customInput=document.createElement('input');
                customInput.className='custom-input';
                customInput.id='custom-'+cat;
                customInput.placeholder='Describe your '+categoryMeta[cat].label.split(' ')[1]+' intent...';
                customInput.oninput=function(e){if(selectedCategory===cat&&selectedIntent==='Custom')customIntentText=e.target.value;};
                body.appendChild(btnRow);
                body.appendChild(customInput);
                section.appendChild(header);
                section.appendChild(body);
                panel.appendChild(section);
            });
            // Close button
            const closeBtn=document.createElement('button');
            closeBtn.className='close-btn';
            closeBtn.innerText='CLOSE';
            closeBtn.onclick=closeIntentPanel;
            panel.appendChild(closeBtn);
        }

        function toggleAccordion(cat){
            const bodies=document.querySelectorAll('.accordion-body');
            bodies.forEach(b=>b.classList.remove('open'));
            const body=document.getElementById('body-'+cat);
            if(body) body.classList.toggle('open');
        }
        function collapseAll(){
            document.querySelectorAll('.accordion-body').forEach(b=>b.classList.remove('open'));
        }

        // Initialize accordion
        buildAccordion();

        function selectIntent(cat,intent,isCustom){
            selectedCategory=cat;
            if(isCustom){
                selectedIntent='Custom';
                customIntentText='';
                document.getElementById('custom-'+cat).style.display='block';
            }else{
                selectedIntent=intent;
                customIntentText='';
                document.querySelectorAll('.custom-input').forEach(i=>i.style.display='none');
            }
            // deselect all buttons
            document.querySelectorAll('.intent-btn').forEach(b=>b.classList.remove('selected'));
            // highlight the selected (if not custom, highlight the preset button)
            if(!isCustom){
                const btns=document.getElementById('body-'+cat).querySelectorAll('.intent-btn');
                btns.forEach(b=>{if(b.innerText===intent)b.classList.add('selected')});
            }
        }

        function openCustomInput(cat){
            document.querySelectorAll('.custom-input').forEach(i=>i.style.display='none');
            const inp=document.getElementById('custom-'+cat);
            inp.style.display='block';
            inp.focus();
        }

        window.openIntentPanel=()=>{
            if(!gpsReady){setStatus('warning','GPS not ready');return}
            document.getElementById('intent-panel').style.display='block';
        };
        function closeIntentPanel(){document.getElementById('intent-panel').style.display='none';collapseAll();}

        // The rest of the code (sendMsg, chat, oracle, sync, navigation, rating, drawRoute) is identical to the previous final version.
        // I include them here but in a compact manner to keep the file complete.
        window.sendMsg=async()=>{const val=document.getElementById('chat-in').value;if(!val.trim())return;await _supabase.from('messages').insert([{node_id:currentN.id,sender:'CREATOR',content:val}]);document.getElementById('chat-in').value='';document.getElementById('oracle-btn').style.display='block'}
        function startChatSync(){_supabase.channel('msgs-'+currentN.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'node_id=eq.'+currentN.id},p=>{document.getElementById('msg-box').innerHTML+='<div style="color:#0f0">> '+p.new.content+'</div>';document.getElementById('oracle-btn').style.display='block'}).subscribe()}
        window.initiateOracle=async()=>{if(!gpsReady||myLoc.lat===0){setStatus('error','GPS not ready');return}setStatus('info','Syncing GPS with Oracle...');await _supabase.from('oracle_sessions').upsert({bridge_id:currentN.id,u1_lat:myLoc.lat,u1_lng:myLoc.lng,error_state:null},{onConflict:'bridge_id'})}
        function startOracleLive(){
            _supabase.channel('oracle-'+currentN.id).on('postgres_changes',{event:'*',schema:'public',table:'oracle_sessions',filter:'bridge_id=eq.'+currentN.id},async payload=>{
                const s=payload.new;
                if(s.error_state){setStatus('error',s.error_state);return}
                document.getElementById('oracle-ballot').innerText='STATUS: '+s.status.toUpperCase();document.getElementById('oracle-ballot').style.display='block';
                const hasGPS=(s.u1_lat&&s.u1_lng&&s.u2_lat&&s.u2_lng&&s.u1_lat!==0&&s.u2_lat!==0);
                if(!hasGPS&&s.status==='pending')setStatus('warning','Waiting for both users GPS...');
                if(hasGPS&&s.status==='pending'){setStatus('info','Oracle calculating...');await _supabase.from('oracle_sessions').update({status:'ready'}).eq('bridge_id',currentN.id)}
                if(s.status==='ready'&&!s.options_generated&&!oracleProcessed){oracleProcessed=true;await runOracleBrain(s)}
                if(s.status==='matched'){clearStatus();triggerSync(s)}
                if(s.u1_confirmed&&s.u2_confirmed&&!meetRated)startMeetTimer(s);
                if(s.meet_completed&&!meetRated)showRatingPanel();
            }).subscribe();
        }
        async function runOracleBrain(s){
            const midLat=(s.u1_lat+s.u2_lat)/2,midLng=(s.u1_lng+s.u2_lng)/2;
            const queries=categoryMeta[currentN.category]?.queries||categoryMeta.social.queries;
            let bestVenue=null;
            for(const q of queries){for(const r of[3,6,10,15,MAX_VENUE_DISTANCE_KM]){if(bestVenue)break;
                const box=bbox(midLat,midLng,r);
                const url='https://api.mapbox.com/search/geocode/v6/forward?q='+encodeURIComponent(q)+'&proximity='+midLng+','+midLat+'&bbox='+box+'&limit=10&language=en&access_token='+MAPBOX_TOKEN;
                try{const res=await fetch(url);const d=await res.json();
                    if(d.features&&d.features.length>0){const nearby=d.features.filter(f=>f.geometry.coordinates[1]&&f.geometry.coordinates[0]).map(f=>({name:f.properties.name||f.properties.full_address||'Venue',lat:f.geometry.coordinates[1],lng:f.geometry.coordinates[0],dist:haversine(midLat,midLng,f.geometry.coordinates[1],f.geometry.coordinates[0])})).filter(v=>v.dist<=MAX_VENUE_DISTANCE_KM).sort((a,b)=>a.dist-b.dist);
                        if(nearby.length>0){bestVenue=nearby[0]}}
                }catch(e){}}
                if(bestVenue)break;
            }
            if(bestVenue){await _supabase.from('oracle_sessions').update({status:'matched',options_generated:true,error_state:null,selected_venue_name:bestVenue.name,selected_lat:bestVenue.lat,selected_lng:bestVenue.lng,meet_expires_at:new Date(Date.now()+MEET_DURATION_MINUTES*60*1000).toISOString()}).eq('bridge_id',currentN.id)}
            else{await _supabase.from('oracle_sessions').update({status:'matched',options_generated:true,error_state:null,selected_venue_name:'Midpoint Meeting Spot',selected_lat:midLat,selected_lng:midLng,meet_expires_at:new Date(Date.now()+MEET_DURATION_MINUTES*60*1000).toISOString()}).eq('bridge_id',currentN.id)}
        }
        function triggerSync(s){
            document.getElementById('terminal').style.display='none';
            const syncPanel=document.getElementById('sync-panel');syncPanel.style.display='block';setTimeout(()=>syncPanel.style.opacity='1',10);
            document.getElementById('sync-venue').innerText='Venue: '+s.selected_venue_name;
            document.getElementById('sync-confirm-btn').style.display='block';
            myConfirmed=false;
            selectedVenueCoords={lat:+s.selected_lat,lng:+s.selected_lng};
            const u1lat=+s.u1_lat,u1lng=+s.u1_lng,u2lat=+s.u2_lat,u2lng=+s.u2_lng,vlat=+s.selected_lat,vlng=+s.selected_lng;
            new mapboxgl.Marker({color:'#0f0'}).setLngLat([u1lng,u1lat]).addTo(map);
            new mapboxgl.Marker({color:'#00ffaa'}).setLngLat([u2lng,u2lat]).addTo(map);
            new mapboxgl.Marker({color:'#ff0'}).setLngLat([vlng,vlat]).addTo(map);
            drawRoute('rA',u1lng,u1lat,vlng,vlat,'#0f0',true);
            drawRoute('rB',u2lng,u2lat,vlng,vlat,'#00ffaa',false);
            map.fitBounds(new mapboxgl.LngLatBounds().extend([u1lng,u1lat]).extend([u2lng,u2lat]).extend([vlng,vlat]),{padding:80,duration:2000});
        }
        window.confirmProceed=async()=>{myConfirmed=true;document.getElementById('sync-confirm-btn').style.display='none';document.getElementById('sync-status').innerText='Waiting for other user...';await _supabase.from('oracle_sessions').update({u1_confirmed:true}).eq('bridge_id',currentN.id)}
        function startMeetTimer(s){document.getElementById('sync-panel').style.opacity='0';setTimeout(()=>document.getElementById('sync-panel').style.display='none',300);const navHud=document.getElementById('nav-hud');navHud.style.display='block';setTimeout(()=>navHud.style.opacity='1',10);document.getElementById('target-name').innerText='MEET AT: '+s.selected_venue_name.toUpperCase();document.getElementById('nav-btn').style.display='inline-block';let remaining=MEET_DURATION_MINUTES*60;meetTimerInterval=setInterval(async()=>{remaining--;const mins=Math.floor(remaining/60),secs=remaining%60;document.getElementById('meet-timer').innerText='MEET WINDOW: '+mins+'m '+secs+'s';if(remaining<=0){clearInterval(meetTimerInterval);await _supabase.from('oracle_sessions').update({meet_completed:true}).eq('bridge_id',currentN.id)}},1000)}
        window.startNavigation=()=>{if(!selectedVenueCoords)return;navActive=true;document.getElementById('instruction-banner').style.display='block';currentStep=0;updateInstruction();if(navWatchId)navigator.geolocation.clearWatch(navWatchId);navWatchId=navigator.geolocation.watchPosition(pos=>{if(!navActive)return;map.setCenter([pos.coords.longitude,pos.coords.latitude]);checkProgress(pos.coords.latitude,pos.coords.longitude)},e=>{},{enableHighAccuracy:true})}
        function updateInstruction(){if(!routeSteps.length||currentStep>=routeSteps.length)return;document.getElementById('instruction-banner').innerText=routeSteps[currentStep].maneuver.instruction}
        function checkProgress(lat,lng){if(!routeSteps.length||currentStep>=routeSteps.length)return;const next=routeSteps[currentStep];const d=haversine(lat,lng,next.maneuver.location[1],next.maneuver.location[0]);if(d<0.05&&currentStep<routeSteps.length-1){currentStep++;updateInstruction()}const toVenue=haversine(lat,lng,selectedVenueCoords.lat,selectedVenueCoords.lng);if(toVenue<0.05){document.getElementById('instruction-banner').innerText='✅ You have arrived!';setTimeout(()=>{document.getElementById('instruction-banner').style.display='none';navActive=false;if(navWatchId)navigator.geolocation.clearWatch(navWatchId)},3000)}}
        function showRatingPanel(){document.getElementById('nav-hud').style.opacity='0';setTimeout(()=>document.getElementById('nav-hud').style.display='none',300);const rp=document.getElementById('rate-panel');rp.style.display='block';setTimeout(()=>rp.style.opacity='1',10)}
        window.submitRating=async(r)=>{if(meetRated)return;meetRated=true;document.getElementById('rate-panel').style.display='none';await _supabase.from('oracle_sessions').update({u1_rating:r}).eq('bridge_id',currentN.id);const{data:ud}=await _supabase.from('users').select('trust_score,total_meets').eq('id',myUserId).limit(1);if(ud&&ud.length>0){const u=ud[0];const nt=(u.total_meets||0)+1;const ns=((u.trust_score||5.0)*(u.total_meets||0)+(r===1?1:0))/nt;await _supabase.from('users').update({trust_score:Math.round(ns*10)/10,total_meets:nt}).eq('id',myUserId)}setStatus('success','Thanks for rating!');setTimeout(()=>location.reload(),3000)}
        async function drawRoute(id,sLng,sLat,eLng,eLat,color,storeSteps=false){try{const url='https://api.mapbox.com/directions/v5/mapbox/driving/'+sLng+','+sLat+';'+eLng+','+eLat+'?geometries=geojson&overview=full&steps=true&access_token='+MAPBOX_TOKEN;const r=await(await fetch(url)).json();if(!r.routes||!r.routes[0])return;if(map.getLayer(id))map.removeLayer(id);if(map.getSource(id))map.removeSource(id);map.addSource(id,{type:'geojson',data:{type:'Feature',geometry:r.routes[0].geometry}});map.addLayer({id,type:'line',source:id,paint:{'line-color':color,'line-width':5}});if(storeSteps)routeSteps=r.routes[0].legs[0].steps}catch(e){}}
    </script>
