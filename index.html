<!DOCTYPE html>
<html>
<head>
    <title>VESSEL: CREATOR</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        #status { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid #0f0; box-shadow: 0 0 10px #0f0; }
        
        /* Chat Interface */
        #chat-ui { display: none; height: 100vh; width: 100vw; flex-direction: column; background: #000; padding: 20px; box-sizing: border-box; }
        #messages-box { flex-grow: 1; overflow-y: auto; border: 1px solid #0f0; margin-bottom: 15px; padding: 15px; background: rgba(0,20,0,0.2); }
        .msg { margin-bottom: 10px; line-height: 1.4; border-bottom: 1px solid #030; padding-bottom: 5px; }
        .msg-sender { color: #fff; font-weight: bold; margin-right: 10px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 15px; font-family: monospace; width: 100%; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>
    <div id="status">SYSTEM READY: DROP NODE ON MAP</div>
    <div id="map"></div>

    <div id="chat-ui">
        <h2 style="border-bottom: 1px solid #0f0; padding-bottom: 10px;">[ SECURE TERMINAL ACTIVE ]</h2>
        <div id="messages-box"></div>
        <input type="text" id="chat-input" placeholder="Enter message to Seeker..." onkeypress="if(event.key==='Enter') sendMessage()">
    </div>

    <script>
        const SB_URL = "https://rnroyhkvkmzuichysxnk.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });

        let myNodeId = null;

        map.on('click', async (e) => {
            if (myNodeId) return; // Only allow one node per session
            
            const { data, error } = await _supabase.from('nodes').insert([{ lat: e.lngLat.lat, lng: e.lngLat.lng, status: 'active' }]).select();
            if (error) { console.error(error); return; }

            myNodeId = data[0].id;
            document.getElementById('status').innerText = "LIVE NODE: " + myNodeId + " | WAITING FOR HANDSHAKE...";
            new mapboxgl.Marker({color: '#0f0'}).setLngLat(e.lngLat).addTo(map);

            // Watch for the Bridge
            const checkBridge = setInterval(async () => {
                const { data: node } = await _supabase.from('nodes').select('status').eq('id', myNodeId).single();
                if (node && node.status === 'bridged') {
                    clearInterval(checkBridge);
                    switchToChat();
                }
            }, 2000);
        });

        function switchToChat() {
            document.getElementById('map').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            setInterval(fetchMessages, 2500);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if (!val) return;

            await _supabase.from('messages').insert([{ node_id: myNodeId, sender: 'CREATOR', content: val }]);
            input.value = '';
            fetchMessages();
        }

        async function fetchMessages() {
            const { data } = await _supabase.from('messages').select('*').eq('node_id', myNodeId).order('created_at', { ascending: true });
            if (data) {
                const box = document.getElementById('messages-box');
                box.innerHTML = data.map(m => `
                    <div class="msg">
                        <span class="msg-sender">[${m.sender}]</span>
                        <span class="msg-content">${m.content}</span>
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
