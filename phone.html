<!DOCTYPE html>
<html>
<head>
    <title>VESSEL: SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        #map { height: 100vh; width: 100vw; }
        .marker { width: 35px; height: 35px; background: #0f0; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "sb_secret_hs-PNPi09SXyVbrSbbYJHg_5wSiF71X");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        let markers = [];

        async function scan() {
            const { data: nodes } = await _supabase.from('nodes').select('*').eq('status', 'active');
            if (!nodes) return;

            markers.forEach(m => m.remove());
            markers = [];

            nodes.forEach(n => {
                const el = document.createElement('div');
                el.className = 'marker';
                el.innerText = n.id;
                el.onclick = async () => {
                    // Update cloud status to bridged
                    await _supabase.from('nodes').update({ status: 'bridged' }).eq('id', n.id);
                    el.style.background = '#fff';
                    console.log("Bridged node:", n.id);
                };
                const m = new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
                markers.push(m);
            });
        }
        setInterval(scan, 4000);
    </script>
</body>
</html>
