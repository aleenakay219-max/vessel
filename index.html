        #profile-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,10,0,0.97);border:2px solid #0f0;z-index:6000;padding:20px;color:#0f0;width:85%;max-width:320px;box-sizing:border-box}

        .intent-btn.custom{border-style:dashed}
        .node-type-row{margin:8px 0;display:flex;gap:10px;align-items:center}

    </style>
</head>

        <input type="text" id="prof-nationality" placeholder="e.g. Indian, Emirati">
        <label>Profession</label>
        <input type="text" id="prof-profession" placeholder="e.g. Designer, Student">
        <label>Vibe Tags (comma separated)</label>
        <input type="text" id="prof-tags" placeholder="e.g. Creative, Night Owl">
        <button class="profile-save-btn" onclick="saveProfile()">SAVE</button>

        <div id="msg-box"></div>

            <button onclick="sendMsg()" style="background:#0f0;color:#000;border:none;padding:10px;margin-left:5px;cursor:pointer;font-weight:bold">SEND</button>
        </div>
    </div>
