<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; }
        #terminal { display: none; position: fixed; bottom: 10px; left: 5%; width: 90%; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 2000; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #msg-box { height: 150px; overflow-y: auto; color:#0f0; margin-bottom: 10px; border: 1px solid #030; padding: 5px; }
        #nav-hud { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 10, 0, 0.95); border-top: 2px solid #0f0; z-index: 4000; padding: 20px; text-align: center; color: #0f0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none; width:100%; padding:12px; background:transparent; border:1px solid #0f0; color:#0f0; margin-bottom:10px;">[ SYNC GPS ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;"><input type="text" id="chat-in" style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px;"><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px; margin-left:5px;">SEND</button></div>
    </div>
    <div id="nav-hud"><h3 id="target-name">SYNCED</h3><button onclick="location.reload()" style="background:transparent; border:1px solid #0f0; color:#0f0; padding:10px;">EXIT</button></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });
        let currentN = null, myLoc = null, activeMarkers = [], oracleProcessed = false;

        navigator.geolocation.watchPosition(p => { myLoc = {lat: p.coords.latitude, lng: p.coords.longitude}; }, null, {enableHighAccuracy: true});

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            activeMarkers.forEach(m => m.remove());
            activeMarkers = [];
            data?.forEach(n => {
                const el = document.createElement('div'); el.style.cssText = "color:#0f0; background:#000; border:1px solid #0f0; padding:5px; font-size:10px;"; el.innerText = "[ NODE ]";
                el.onclick = async () => {
                    if (currentN) return;
                    currentN = n;
                    await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync(); startOracleLive();
                };
                const m = new mapboxgl.Marker(el).setLngLat([parseFloat(n.lng), parseFloat(n.lat)]).addTo(map);
                activeMarkers.push(m);
            });
        }
        setInterval(scan, 5000);

        window.sendMsg = async () => {
            const val = document.getElementById('chat-in').value;
            await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]);
            document.getElementById('chat-in').value = '';
            document.getElementById('oracle-btn').style.display = 'block';
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => {
                document.getElementById('msg-box').innerHTML += `<div>> ${p.new.content}</div>`;
                document.getElementById('oracle-btn').style.display = 'block';
            }).subscribe();
        }

        window.initiateOracle = async () => {
            if (!myLoc) return;
            await _supabase.from('oracle_sessions').upsert({ bridge_id: currentN.id, u2_lat: myLoc.lat, u2_lng: myLoc.lng }, { onConflict: 'bridge_id' });
        };

        function startOracleLive() {
            _supabase.channel('oracle-' + currentN.id)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${currentN.id}` }, payload => {
                const s = payload.new || payload.old;
                if (s.u1_lat && s.u2_lat && !s.options_generated && !oracleProcessed) runOracleBrain(s);
                if (s.status === 'matched') triggerSync(s);
            }).subscribe();
        }

        async function runOracleBrain(s) {
            oracleProcessed = true;
            const mLa = (s.u1_lat + s.u2_lat) / 2; const mLn = (s.u1_lng + s.u2_lng) / 2;
            const res = await fetch(`https://api.mapbox.com/search/geocode/v6/forward?q=cafe&proximity=${mLn},${mLa}&limit=1&access_token=${MAPBOX_TOKEN}`);
            const d = await res.json();
            const v = d.features[0];
            await _supabase.from('oracle_sessions').update({ status:'matched', options_generated:true, selected_venue_name:v.properties.name, selected_lat:v.geometry.coordinates[1], selected_lng:v.geometry.coordinates[0] }).eq('bridge_id', currentN.id);
        }

        function triggerSync(s) {
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('nav-hud').style.display = 'block';
            document.getElementById('target-name').innerText = `WALK TO ${s.selected_venue_name.toUpperCase()}`;
            drawRoute('routeA', s.u1_lng, s.u1_lat, s.selected_lng, s.selected_lat, '#0f0');
            drawRoute('routeB', s.u2_lng, s.u2_lat, s.selected_lng, s.selected_lat, '#00ffaa');
            map.fitBounds(new mapboxgl.LngLatBounds().extend([s.u1_lng, s.u1_lat]).extend([s.u2_lng, s.u2_lat]).extend([s.selected_lng, s.selected_lat]), { padding: 50 });
        }

        async function drawRoute(id, sLng, sLat, eLng, eLat, color) {
            const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${sLng},${sLat};${eLng},${eLat}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;
            const res = await fetch(url); const d = await res.json();
            if (map.getSource(id)) { map.removeLayer(id); map.removeSource(id); }
            map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: d.routes[0].geometry } });
            map.addLayer({ id, type: 'line', source: id, paint: { 'line-color': color, 'line-width': 6 } });
        }
    </script>
</body>
</html>
