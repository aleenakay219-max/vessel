<!-- Same head, styles, body as before until script -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    // ====== TOKENS & SETUP ======
    mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
    const supabaseUrl = 'https://rnroyhkvkmzuichysxnk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const FAKE_LAT = 25.0800;
    const FAKE_LNG = 55.1400;
    const MEET_DURATION_MINUTES = 25;

    let myUserId = localStorage.getItem('vessel_user_id');
    if (!myUserId) {
        myUserId = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
        localStorage.setItem('vessel_user_id', myUserId);
    }

    // Color map
    const intentColors = {
        '☕ Coffee': '#FFD700',
        '🚶 Walk': '#00FF88',
        '🍽️ Food': '#FF6B6B',
        '📚 Study': '#6BCBFF',
        '🏋️ Gym': '#FF8C42',
        '🍺 Drinks': '#C084FC',
        '⚽ Sports': '#4ADE80',
        '💬 Chat': '#F472B6'
    };
    // default fallback
    const defaultColor = '#AAAAAA';

    // ====== MAP INIT ======
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [FAKE_LNG, FAKE_LAT],
        zoom: 14
    });

    // All markers will be drawn as a single GeoJSON source for clustering
    map.on('load', () => {
        // Add empty source
        map.addSource('nodes-source', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] },
            cluster: true,           // enable clustering
            clusterMaxZoom: 14,      // don't cluster above zoom 14
            clusterRadius: 50        // radius for clustering
        });

        // Layer for clustered points (big circles with count)
        map.addLayer({
            id: 'nodes-clusters',
            type: 'circle',
            source: 'nodes-source',
            filter: ['has', 'point_count'],
            paint: {
                'circle-color': '#111111',
                'circle-stroke-color': '#0f0',
                'circle-stroke-width': 2,
                'circle-radius': [
                    'step',
                    ['get', 'point_count'],
                    20,   // <10 points: radius 20
                    10, 25,
                    20, 30,
                    50, 35
                ],
                'circle-opacity': 0.9
            }
        });

        // Layer for cluster count text
        map.addLayer({
            id: 'nodes-cluster-count',
            type: 'symbol',
            source: 'nodes-source',
            filter: ['has', 'point_count'],
            layout: {
                'text-field': '{point_count_abbreviated}',
                'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
                'text-size': 14,
                'text-allow-overlap': true
            },
            paint: {
                'text-color': '#0f0'
            }
        });

        // Layer for individual node dots (colored by intent)
        map.addLayer({
            id: 'nodes-unclustered',
            type: 'circle',
            source: 'nodes-source',
            filter: ['!', ['has', 'point_count']],
            paint: {
                'circle-color': ['get', 'color'],
                'circle-radius': 7,
                'circle-opacity': 0.9,
                'circle-stroke-color': '#ffffff',
                'circle-stroke-width': 1
            }
        });

        // Hover/tap interaction: show popup with intent and time left
        const popup = new mapboxgl.Popup({
            closeButton: false,
            closeOnClick: false,
            className: 'node-popup'
        });

        // Show popup on mouseenter for unclustered points
        map.on('mouseenter', 'nodes-unclustered', (e) => {
            map.getCanvas().style.cursor = 'pointer';
            const props = e.features[0].properties;
            const timeLeft = Math.max(0, Math.floor((new Date(props.expires_at) - Date.now()) / 60000));
            const html = `<div style="background:#000; color:#0f0; padding:8px 12px; border:1px solid #0f0; font-family:monospace;">
                ${props.intent} [${timeLeft}m]</div>`;
            popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
        });

        map.on('mouseleave', 'nodes-unclustered', () => {
            map.getCanvas().style.cursor = '';
            popup.remove();
        });

        // Click on node to request (same logic as before)
        map.on('click', 'nodes-unclustered', async (e) => {
            const node = e.features[0];
            if (currentN) return;
            currentN = node.properties; // we'll store the full node object in properties
            // Send request (simplified, use stored node id)
            await supabaseClient.from('requests').insert([{
                node_id: node.properties.id,
                requester_id: 'SEEKER'
            }]);
            document.getElementById('terminal').style.display = 'flex';
            document.getElementById('status-bar').style.display = 'none';
            startChatSync();
            startOracleLive();
        });

        // Zoom to cluster on click (optional nice touch)
        map.on('click', 'nodes-clusters', (e) => {
            const features = map.queryRenderedFeatures(e.point, { layers: ['nodes-clusters'] });
            const clusterId = features[0].properties.cluster_id;
            map.getSource('nodes-source').getClusterExpansionZoom(clusterId, (err, zoom) => {
                if (err) return;
                map.easeTo({
                    center: features[0].geometry.coordinates,
                    zoom: zoom
                });
            });
        });

        document.getElementById('status-bar').innerText = 'Map loaded! Scanning...';
        scan(); // initial scan
    });

    // ====== SCAN FUNCTION (UPDATED TO USE GEOJSON) ======
    async function scan() {
        const now = new Date().toISOString();
        const { data, error } = await supabaseClient.from('nodes')
            .select('*')
            .eq('status', 'active')
            .gt('expires_at', now);

        if (error) {
            document.getElementById('status-bar').innerText = 'Connection issue';
            return;
        }

        // Convert nodes to GeoJSON features
        const features = (data || []).map(node => ({
            type: 'Feature',
            geometry: {
                type: 'Point',
                coordinates: [parseFloat(node.lng), parseFloat(node.lat)]
            },
            properties: {
                id: node.id,
                intent: node.intent || '☕ Coffee',
                color: intentColors[node.intent] || defaultColor,
                expires_at: node.expires_at,
                user_id: node.user_id
                // add any other needed props
            }
        }));

        // Update the source data
        const source = map.getSource('nodes-source');
        if (source) {
            source.setData({
                type: 'FeatureCollection',
                features: features
            });
        }

        if (features.length === 0) {
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').innerText = 'No active nodes. Scanning...';
            document.getElementById('status-bar').style.borderColor = '#ff0';
            document.getElementById('status-bar').style.color = '#ff0';
        } else {
            document.getElementById('status-bar').style.display = 'none';
        }
    }

    setInterval(scan, 5000);

    // ====== REST OF YOUR EXISTING FUNCTIONS (startChatSync, oracle, etc.) ======
    // Keep them exactly as before, but adjust the node click handler to use the
    // new properties (currentN will be the node properties object with id, etc.)
    // ...

</script>
