<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .marker { padding: 8px; background: #000; border: 1px solid #0f0; color: #0f0; font-size: 10px; }
        #challenge { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .vibe-btn { width: 100%; padding: 15px; margin: 10px 0; background: transparent; color: #0f0; border: 1px solid #0f0; font-size: 16px; font-family: monospace; }
        
        #terminal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #msg-box { flex: 1; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border: 1px solid #030; max-width: 85%; }
        .msg.me { align-self: flex-end; border-color: #0f0; }
        .msg.them { align-self: flex-start; background: #010; }
        .input-area { display: flex; background: #000; border-top: 1px solid #0f0; padding-top: 10px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #030; color: #0f0; padding: 12px; outline: none; }
        
        #oracle-btn { display: none; width: 100%; padding: 10px; background: transparent; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; font-family: monospace; }
        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 15px; margin-bottom: 10px; background: rgba(0,255,0,0.1); }
        .venue-card { border: 1px solid #0f0; padding: 10px; margin-top: 10px; cursor: pointer; font-size: 12px; }
        .venue-card:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="challenge">
        <h2 id="q-text"></h2>
        <button class="vibe-btn" id="btn-a" onclick="answer(0)"></button>
        <button class="vibe-btn" id="btn-b" onclick="answer(1)"></button>
    </div>
    
    <div id="terminal">
        <div id="oracle-ballot">
            <div style="border-bottom:1px solid #0f0; margin-bottom:10px; font-size:12px;">ORACLE RECOMMENDATIONS</div>
            <div id="venue-list">Synchronizing hardware...</div>
        </div>
        <button id="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <div class="input-area">
            <input type="text" id="chat-in" placeholder="MESSAGE..." autocomplete="off">
            <button id="send-btn" onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px 20px; margin-left:5px;">SEND</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;
        
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });
        let currentN = null, localMsgCount = 0;
        const templates = { '☕ Coffee': ['Quiet café', 'Loud café'], '💬 Chat': ['Deep talks', 'Small talk'], '🚶 Walk': ['No music', 'Full speaker mode'], '✨ Connect': ['Genuine curiosity', 'Flexing'] };
        const searchTerms = { '☕ Coffee': 'cafe', '💬 Chat': 'lounge', '🚶 Walk': 'park', '✨ Connect': 'restaurant' };

        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            document.querySelectorAll('.marker').forEach(m => m.remove());
            data?.forEach(n => {
                const el = document.createElement('div'); el.className = 'marker'; el.innerText = n.intent;
                el.onclick = () => { 
                    currentN = n; document.getElementById('q-text').innerText = n.secret_q; 
                    document.getElementById('btn-a').innerText = templates[n.intent][0]; 
                    document.getElementById('btn-b').innerText = templates[n.intent][1]; 
                    document.getElementById('challenge').style.display = 'flex'; 
                };
                new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
            });
        }

        window.answer = async (i) => {
            const choice = templates[currentN.intent][i];
            if(choice === currentN.secret_a_adx) {
                await _supabase.from('requests').insert([{ node_id: currentN.id, requester_id: 'SEEKER', answer_given: choice, status: 'pending' }]);
                document.getElementById('challenge').innerHTML = "<h2>QUALIFIED. WAITING...</h2>";
                const check = setInterval(async () => {
                    const { data } = await _supabase.from('nodes').select('status').eq('id', currentN.id).single();
                    if(data && data.status === 'bridged') { 
                        clearInterval(check); 
                        document.getElementById('challenge').style.display='none'; 
                        document.getElementById('terminal').style.display='flex'; 
                        startChatSync(); startOracleSync();
                    }
                }, 2000);
            }
        };

        function startChatSync() {
            _supabase.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `node_id=eq.${currentN.id}` }, payload => {
                if(payload.new.sender !== 'SEEKER') renderMsg(payload.new);
            }).subscribe();
        }

        window.sendMsg = async () => {
            const input = document.getElementById('chat-in');
            const val = input.value; if(!val) return;
            renderMsg({ sender: 'SEEKER', content: val });
            await _supabase.from('messages').insert([{ node_id: currentN.id, sender: 'SEEKER', content: val }]);
            input.value = '';
        }

        function renderMsg(m) {
            const box = document.getElementById('msg-box');
            const div = document.createElement('div');
            div.className = `msg ${m.sender === 'SEEKER' ? 'me' : 'them'}`;
            div.innerText = m.content;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            localMsgCount++;
            if(localMsgCount >= 5) document.getElementById('oracle-btn').style.display = 'block';
        }

        window.initiateOracle = async () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('oracle_sessions').upsert({ 
                    bridge_id: currentN.id, u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude, status: 'syncing'
                });
                document.getElementById('oracle-ballot').style.display = 'block';
            });
        };

        function startOracleSync() {
            _supabase.channel('oracle-sync').on('postgres_changes', { 
                event: '*', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${currentN.id}` 
            }, async (payload) => {
                const session = payload.new || payload.old;
                if (session.u1_lat && !session.u2_lat) {
                    document.getElementById('oracle-ballot').style.display = 'block';
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        await _supabase.from('oracle_sessions').update({ u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude }).eq('bridge_id', currentN.id);
                    });
                }
                if (session.u1_lat && session.u2_lat) {
                    document.getElementById('oracle-ballot').style.display = 'block';
                    fetchVenues(session.u1_lat, session.u1_lng, session.u2_lat, session.u2_lng);
                }
            }).subscribe();
        }

        async function fetchVenues(lat1, lng1, lat2, lng2) {
            const midLat = (lat1 + lat2) / 2;
            const midLng = (lng1 + lng2) / 2;
            const category = searchTerms[currentN.intent];
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${category}.json?proximity=${midLng},${midLat}&limit=3&access_token=${MAPBOX_TOKEN}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const list = document.getElementById('venue-list');
                list.innerHTML = '';
                data.features.forEach(f => {
                    list.innerHTML += `<div class="venue-card" onclick="selectVenue('${f.text}')">[ OPTION ]: ${f.text.toUpperCase()}</div>`;
                });
            } catch (e) { console.log(e); }
        }

        window.selectVenue = (name) => { alert("VOTED: " + name); }

        setInterval(scan, 5000); scan();
    </script>
</body>
</html>
