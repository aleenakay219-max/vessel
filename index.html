<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | TRAIL DIAGNOSTICS</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #overlay { position: fixed; top: 20px; left: 20px; background: rgba(0,20,0,0.9); color: #0f0; border: 1px solid #0f0; padding: 15px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        STATUS: <span id="status">INIT...</span><br>
        ROUTE A: <span id="routeA-stat">WAITING</span><br>
        ROUTE B: <span id="routeB-stat">WAITING</span>
    </div>
    <div id="map"></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script>
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;

        // HARCODED TEST POINTS (Sharjah)
        const userA = [55.378, 25.297]; // Al Nahda
        const userB = [55.365, 25.310]; // Near Al Qasba
        const venue = [55.369, 25.298]; // Sahara Centre

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [55.37, 25.30],
            zoom: 13
        });

        map.on('load', async () => {
            document.getElementById('status').innerText = "MAP READY. DRAWING...";
            
            // Markers
            new mapboxgl.Marker({color: '#0f0'}).setLngLat(userA).addTo(map);
            new mapboxgl.Marker({color: '#00aa00'}).setLngLat(userB).addTo(map);
            new mapboxgl.Marker({color: '#f00'}).setLngLat(venue).addTo(map);

            // Trigger Blueprint logic
            await drawRoute('routeA', userA[0], userA[1], venue[0], venue[1]);
            await drawRoute('routeB', userB[0], userB[1], venue[0], venue[1]);
            
            document.getElementById('status').innerText = "COMPLETE";
            
            const bounds = new mapboxgl.LngLatBounds().extend(userA).extend(userB).extend(venue);
            map.fitBounds(bounds, { padding: 80, pitch: 45 });
        });

        async function drawRoute(id, fLng, fLat, tLng, tLat) {
            const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${fLng},${fLat};${tLng},${tLat}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const route = data.routes[0].geometry;

                if (map.getSource(id)) {
                    map.removeLayer(id);
                    map.removeSource(id);
                }

                map.addSource(id, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: route }
                });

                map.addLayer({
                    id: id,
                    type: 'line',
                    source: id,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': id === 'routeA' ? '#00ff00' : '#00aa00',
                        'line-width': 6,
                        'line-opacity': 0.9,
                        'line-dasharray': id === 'routeB' ? [2, 1] : [1]
                    }
                });
                document.getElementById(`${id}-stat`).innerText = "RENDERED";
            } catch (e) {
                document.getElementById(`${id}-stat`).innerText = "FAILED";
                console.error(e);
            }
        }
    </script>
</body>
</html>
