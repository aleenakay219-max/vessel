<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBELISK 1.0 | MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00ff00; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; position: fixed; width: 100%; height: 100%; }
        #terminal { height: 75vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; }
        #input-area { height: 10vh; display: flex; padding: 10px; background: #000; border-top: 1px solid #333; }
        input { flex: 1; background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 12px; font-size: 16px; }
        
        /* ORACLE MOBILE UI */
        .oracle-btn { display: none; background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 15px; margin: 10px; width: calc(100% - 20px); font-size: 14px; }
        #oracle-ballot { display: none; position: fixed; top: 20%; left: 5%; width: 90%; background: #000; border: 1px solid var(--neon); padding: 15px; z-index: 3000; }
    </style>
</head>
<body>

<div id="terminal"><div id="messages">SYNCED TO OBELISK...</div></div>

<button id="oracle-btn" class="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>

<div id="oracle-ballot">
    <h3 style="border-bottom: 1px solid var(--neon)">ORACLE SYNC</h3>
    <div id="venue-list">Capturing mobile GPS data...</div>
</div>

<div id="input-area">
    <input type="text" id="msgInput" placeholder="MESSAGE..." onkeypress="if(event.key==='Enter') sendMessage()">
</div>

<script>
    const _supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');
    let currentBridgeId = null; 

    // --- MESSAGE LOGIC ---
    async function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if(!text || !currentBridgeId) return;
        await _supabase.from('messages').insert([{ node_id: currentBridgeId, content: text, sender: 'seeker' }]);
        document.getElementById('msgInput').value = '';
    }

    // --- MOBILE GPS HANDSHAKE ---
    const listenForRequest = (bridgeId) => {
        _supabase.channel('oracle-trigger').on('postgres_changes', { 
            event: 'INSERT', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${bridgeId}` 
        }, async () => {
            document.getElementById('oracle-ballot').style.display = 'block';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('oracle_sessions').update({ 
                    u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude 
                }).eq('bridge_id', bridgeId);
            });
        }).subscribe();
    };

    const monitorUnlock = (bridgeId) => {
        _supabase.channel('unlock').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'nodes', filter: `id=eq.${bridgeId}` 
        }, payload => {
            if (payload.new.msg_count >= 5) document.getElementById('oracle-btn').style.display = 'block';
        }).subscribe();
    };
</script>
</body>
</html>
