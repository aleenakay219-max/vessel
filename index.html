<!DOCTYPE html>
<html>
<head>
    <title>OBELISK 1.0 | CREATOR</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-overlay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1; width: 90%; text-align: center; }
        .terminal-btn { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 10px #00ff00; width: 100%; max-width: 300px; }
        .status-bar { background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px; margin-top: 10px; border: 1px solid #00ff00; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>

<div class="ui-overlay">
    <button class="terminal-btn" onclick="dropVessel()">[ DROP VESSEL ]</button><br>
    <div id="status" class="status-bar">SYSTEM READY: WAITING FOR COORDINATES</div>
</div>

<div id="map"></div>

<script>
    const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
    const SUPABASE_URL = 'https://rnroyhkvkmzuichysxnk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU';

    mapboxgl.accessToken = MAPBOX_TOKEN;
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v10',
        center: [55.3, 25.3], // Defaulting near Sharjah area
        zoom: 12
    });

    // Center map on user
    navigator.geolocation.getCurrentPosition(pos => {
        map.flyTo({ center: [pos.coords.longitude, pos.coords.latitude], zoom: 14 });
    }, err => console.log("Geolocation blocked or unavailable."));

    async function dropVessel() {
        const center = map.getCenter();
        const statusEl = document.getElementById('status');
        
        statusEl.innerText = "UPLOADING COORDINATES...";

        const { data, error } = await _supabase
            .from('nodes')
            .insert([{ 
                lat: center.lat, 
                lng: center.lng, 
                status: 'active',
                msg_count: 0 
            }])
            .select();

        if (error) {
            statusEl.innerText = "UPLOAD FAILED: " + error.message;
        } else {
            statusEl.innerText = "VESSEL DROPPED. WAITING FOR SEEKER...";
            new mapboxgl.Marker({ color: '#00ff00' }).setLngLat(center).addTo(map);
        }
    }
</script>
</body>
</html>
