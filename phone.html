<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background:#111;overflow:hidden;font-family:monospace}
        #map{height:100%;width:100%;position:absolute;top:0;z-index:1}
        #status-bar{display:block;position:fixed;top:10px;left:5%;width:90%;background:rgba(0,0,0,0.9);border:1px solid #ff0;z-index:3000;padding:10px;text-align:center;color:#ff0;font-size:12px;box-sizing:border-box}
        #terminal{display:none;position:fixed;bottom:10px;left:5%;width:90%;background:rgba(0,10,0,0.95);border:1px solid #0f0;z-index:2000;flex-direction:column;padding:15px;box-sizing:border-box}
        #msg-box{height:150px;overflow-y:auto;color:#0f0;margin-bottom:10px;border:1px solid #030;padding:5px;display:flex;flex-direction:column}
        .chat-msg{max-width:80%;padding:8px 12px;margin:4px 0;border-radius:8px;word-wrap:break-word;font-size:13px;line-height:1.4}
        .msg-left{align-self:flex-start;background:#111;border:1px solid #0f0;color:#0f0}
        .msg-right{align-self:flex-end;background:#0f0;color:#000;border:1px solid #0f0}
        #oracle-ballot{display:none;color:#0f0;border:1px solid #0f0;padding:10px;margin-bottom:10px;background:rgba(0,255,0,0.1);font-size:11px;text-align:center}
        #sync-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #0f0;z-index:5000;padding:30px;text-align:center;color:#0f0}
        #rate-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #ff0;z-index:5000;padding:30px;text-align:center;color:#ff0}
        #nav-hud{display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(0,10,0,0.95);border-top:2px solid #0f0;z-index:4000;padding:20px;text-align:center;color:#0f0;box-sizing:border-box}
        .hud-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:12px;margin:10px 5px;cursor:pointer;font-family:monospace;text-transform:uppercase}
        .sync-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 30px;cursor:pointer;font-family:monospace;font-size:16px;margin:10px}
        .rate-btn{background:transparent;border:2px solid #ff0;color:#ff0;padding:15px 25px;cursor:pointer;font-family:monospace;font-size:24px;margin:10px}
        .node-popup .mapboxgl-popup-content{background:#000!important;border:1px solid #0f0!important;color:#0f0!important;font-family:monospace;padding:6px 10px!important;border-radius:0!important;box-shadow:0 0 10px #0f0}
        .node-popup .mapboxgl-popup-tip{border-top-color:#0f0!important}
        #profile-card{display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(0,10,0,0.97);border-top:2px solid #0f0;z-index:4500;padding:20px;color:#0f0;box-sizing:border-box;max-height:55vh;overflow-y:auto}
        #profile-card .emoji{font-size:40px;text-align:center}
        #profile-card .name{font-size:18px;text-align:center;margin:5px 0}
        #profile-card .stats{text-align:center;font-size:12px;color:#aaa;margin-bottom:10px}
        #profile-card .row{display:flex;justify-content:space-between;font-size:13px;margin:4px 0}
        #profile-card .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
        #profile-card .tag{background:rgba(0,255,0,0.15);border:1px solid #0f0;padding:3px 8px;font-size:11px}
        #profile-card .vibe-section{margin-top:12px;border-top:1px solid #0f0;padding-top:10px}
        #profile-card .vibe-opt{background:transparent;border:1px solid #0f0;color:#0f0;padding:8px 15px;cursor:pointer;font-family:monospace;font-size:12px;margin:5px}
        #profile-card .vibe-opt.selected{background:#0f0;color:#000}
        #profile-card .send-btn{display:block;width:100%;margin-top:15px;background:#0f0;color:#000;border:none;padding:12px;cursor:pointer;font-family:monospace;font-size:15px;font-weight:bold}
        #profile-card .close-card{display:block;width:100%;margin-top:8px;background:transparent;border:1px solid #f00;color:#f00;padding:10px;cursor:pointer;font-family:monospace}
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="status-bar">Loading map...</div>
    <div id="profile-card">
        <div class="emoji" id="card-emoji"></div>
        <div class="name" id="card-name"></div>
        <div class="stats" id="card-stats"></div>
        <div class="row"><span>Age</span><span id="card-age"></span></div>
        <div class="row"><span>Nationality</span><span id="card-nationality"></span></div>
        <div class="row"><span>Profession</span><span id="card-profession"></span></div>
        <div class="tags" id="card-tags"></div>
        <div class="vibe-section" id="card-vibe" style="display:none"></div>
        <button class="send-btn" id="card-send-btn">[ SEND REQUEST ]</button>
        <button class="close-card" onclick="closeProfileCard()">CLOSE</button>
    </div>
    <div id="terminal">
        <div id="oracle-ballot">STATUS: PENDING</div>
        <button id="oracle-btn" onclick="initiateOracle()" style="display:none;width:100%;padding:12px;background:transparent;border:1px solid #0f0;color:#0f0;margin-bottom:10px;cursor:pointer">[ SYNC GPS WITH ORACLE ]</button>
        <div id="msg-box"></div>
        <div id="chat-controls" style="display:flex">
            <input type="text" id="chat-in" placeholder="TYPE..." style="flex:1;background:#000;border:1px solid #0f0;color:#0f0;padding:10px;outline:none">
            <button id="send-btn" style="background:#0f0;color:#000;border:none;padding:10px;margin-left:5px;cursor:pointer;font-weight:bold">SEND</button>
        </div>
    </div>
    <div id="sync-panel">
        <h2>VENUE LOCKED</h2>
        <p id="sync-venue"></p>
        <p id="sync-status">Waiting for both users to confirm...</p>
        <button class="sync-btn" id="sync-confirm-btn" onclick="confirmProceed()">[ CONFIRM & PROCEED ]</button>
    </div>
    <div id="rate-panel">
        <h2>MEET COMPLETE</h2>
        <p>How was your experience?</p>
        <button class="rate-btn" onclick="submitRating(1)">👍</button>
        <button class="rate-btn" onclick="submitRating(-1)">👎</button>
    </div>
    <div id="nav-hud">
        <h3 id="target-name">MATCHED</h3>
        <p id="meet-timer"></p>
        <button class="hud-btn" onclick="location.reload()">TERMINATE</button>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // ... (all previous seeker code unchanged, just chat rendering updated)
        // The key change: the function addMessageToChat() is defined, and both realtime and polling use it.
        function addMessageToChat(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg';
            if (msg.sender === 'SEEKER') {
                msgDiv.classList.add('msg-right');
            } else {
                msgDiv.classList.add('msg-left');
            }
            msgDiv.innerText = msg.content;
            document.getElementById('msg-box').appendChild(msgDiv);
            document.getElementById('msg-box').scrollTop = document.getElementById('msg-box').scrollHeight;
            document.getElementById('oracle-btn').style.display = 'block';
        }
        // ... existing send/fetch logic now calls addMessageToChat instead of innerHTML.
    </script>
</body>
</html>
