<!DOCTYPE html>
<html>
<head>
    <title>VESSEL | CREATOR</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #0f0; --bg: #000; --dim: #030; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        #fab { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--bg); border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); font-size: 30px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        
        /* Inbox UI */
        #inbox-launcher { position: absolute; top: 15px; right: 15px; z-index: 100; background: var(--bg); border: 1px solid var(--neon); padding: 10px; cursor: pointer; }
        #inbox-panel { display: none; position: absolute; top: 70px; right: 15px; width: 350px; height: 500px; background: rgba(0,0,0,0.95); border: 1px solid var(--neon); z-index: 100; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--neon); }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.8em; border-right: 1px solid var(--dim); }
        .tab.active { background: var(--neon); color: var(--bg); }
        #queue-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        /* Queue Card */
        .queue-card { border: 1px solid var(--dim); padding: 15px; margin-bottom: 10px; background: rgba(0,20,0,0.2); }
        .card-header { font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .badge { color: #fff; background: #060; padding: 2px 5px; font-size: 0.7em; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .approve-btn { flex: 1; background: var(--neon); color: #000; border: none; padding: 8px; cursor: pointer; font-family: monospace; }
        .pass-btn { flex: 1; background: transparent; color: #f00; border: 1px solid #f00; padding: 8px; cursor: pointer; font-family: monospace; }

        /* HUD & Terminal styles from previous build... */
        .hud-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 110; background: rgba(0,0,0,0.95); border: 1px solid var(--neon); padding: 25px; width: 320px; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; color: var(--neon); border: 1px solid var(--neon); cursor: pointer; font-family: monospace; }
        #terminal { display: none; height: 100vh; width: 100vw; flex-direction: column; background: var(--bg); padding: 20px; box-sizing: border-box; z-index: 200; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button id="fab" onclick="startCreation()">+</button>
    <div id="inbox-launcher" onclick="toggleInbox()">[ INBOX / QUEUE ]</div>

    <div id="inbox-panel">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('new')">QUALIFIED</div>
            <div class="tab" onclick="switchTab('approved')">APPROVED</div>
        </div>
        <div id="queue-list">
            <div style="color:#050; text-align:center; margin-top:20px;">Scanning for matches...</div>
        </div>
    </div>

    <div id="step-category" class="hud-panel">...</div>
    <div id="step-vibe" class="hud-panel">...</div>
    <div id="step-secret" class="hud-panel">...</div>

    <div id="terminal">...</div>

    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        mapboxgl.accessToken = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.2708, 25.2048], zoom: 11 });

        let myNodeId = null;
        let currentTab = 'new';

        // --- INBOX LOGIC ---
        function toggleInbox() {
            const p = document.getElementById('inbox-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
            if(p.style.display === 'flex') fetchQueue();
        }

        async function fetchQueue() {
            if(!myNodeId) return;
            const { data: requests } = await _supabase.from('requests')
                .select('*').eq('node_id', myNodeId).eq('status', 'pending');
            
            const list = document.getElementById('queue-list');
            list.innerHTML = '';
            
            if(requests.length === 0) {
                list.innerHTML = '<div style="color:#050; text-align:center;">No qualified users yet.</div>';
                return;
            }

            requests.forEach(req => {
                list.innerHTML += `
                    <div class="queue-card">
                        <div class="card-header">
                            <span>User_${req.requester_id.slice(0,4)}</span>
                            <span class="badge">Answered Correct ✅</span>
                        </div>
                        <div style="font-size:0.8em; color:#888;">Intent: ${req.answer_given}</div>
                        <div class="btn-group">
                            <button class="approve-btn" onclick="approveRequest(${req.id})">APPROVE CHAT</button>
                            <button class="pass-btn" onclick="passRequest(${req.id})">PASS</button>
                        </div>
                    </div>
                `;
            });
        }

        async function approveRequest(reqId) {
            // 1. Mark request as approved
            await _supabase.from('requests').update({ status: 'approved' }).eq('id', reqId);
            // 2. Set node to bridged
            await _supabase.from('nodes').update({ status: 'bridged' }).eq('id', myNodeId);
            // 3. UI switch to Terminal
            document.getElementById('inbox-panel').style.display = 'none';
            document.getElementById('terminal').style.display = 'flex';
            startTimer(); // From previous script
        }

        async function passRequest(reqId) {
            await _supabase.from('requests').update({ status: 'passed' }).eq('id', reqId);
            fetchQueue();
        }

        setInterval(fetchQueue, 5000); // Auto-refresh queue every 5 seconds
        
        // ... (Include startCreation, finalizeNode, and other logic from previous build)
    </script>
</body>
</html>
