<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VESSEL | SEEKER</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #map { height: 100%; width: 100%; }
        #terminal { display: none; position: fixed; bottom: 10px; left: 5%; width: 90%; background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 2000; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #oracle-ballot { display: none; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.1); color: #0f0; }
        .venue-card { background: #000; border: 1px solid #0f0; color: #0f0; padding: 14px; margin-top: 8px; font-size: 11px; }
        #msg-box { height: 150px; overflow-y: auto; border: 1px solid #030; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; color: #0f0; }
        #oracle-btn { display: none; width: 100%; padding: 12px; background: transparent; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="terminal">
        <div id="oracle-ballot"><div id="venue-list">Analyzing terrain...</div></div>
        <button id="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>
        <div id="msg-box"></div>
        <div style="display:flex;"><input type="text" id="chat-in" style="flex:1; background:#000; border:1px solid #0f0; color:#0f0; padding:10px;"><button onclick="sendMsg()" style="background:#0f0; color:#000; border:none; padding:10px; margin-left:5px;">SEND</button></div>
    </div>
    <script>
        const _supabase = supabase.createClient("https://rnroyhkvkmzuichysxnk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU");
        const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
        mapboxgl.accessToken = MAPBOX_TOKEN;
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [55.39, 25.34], zoom: 12 });

        let currentN = null, msgCount = 0;
        async function scan() {
            const { data } = await _supabase.from('nodes').select('*').eq('status', 'active');
            data?.forEach(n => {
                const el = document.createElement('div'); el.style.color="#0f0"; el.innerText = "[ NODE ]";
                el.onclick = async () => { 
                    currentN = n; await _supabase.from('requests').insert([{ node_id: n.id, requester_id: 'SEEKER' }]);
                    document.getElementById('terminal').style.display = 'flex';
                    startChatSync(); startOracleSync();
                };
                new mapboxgl.Marker(el).setLngLat([n.lng, n.lat]).addTo(map);
            });
        }
        window.sendMsg = async () => { const val = document.getElementById('chat-in').value; if(!val) return; await _supabase.from('messages').insert([{node_id:currentN.id, sender:'SEEKER', content:val}]); document.getElementById('chat-in').value = ''; };
        function startChatSync() { _supabase.channel('msgs').on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`node_id=eq.${currentN.id}` }, p => { const box = document.getElementById('msg-box'); const isMe = p.new.sender === 'SEEKER'; box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${p.new.content}</div>`; box.scrollTop = box.scrollHeight; msgCount++; if(msgCount >= 5) document.getElementById('oracle-btn').style.display = 'block'; }).subscribe(); }
        window.initiateOracle = () => { navigator.geolocation.getCurrentPosition(async (pos) => { await _supabase.from('oracle_sessions').upsert({ bridge_id: currentN.id, u2_lat: pos.coords.latitude, u2_lng: pos.coords.longitude }, { onConflict: 'bridge_id' }); }); };
        function startOracleSync() { _supabase.channel('oracle-sync').on('postgres_changes', { event:'*', schema:'public', table:'oracle_sessions', filter:`bridge_id=eq.${currentN.id}` }, p => { const s = p.new || p.old; if(s && s.u1_lat && s.u2_lat) fetchVenues(s.u1_lat, s.u1_lng, s.u2_lat, s.u2_lng); }).subscribe(); }

        async function fetchVenues(la1, ln1, la2, ln2) {
            const mLa = (parseFloat(la1) + parseFloat(la2)) / 2;
            const mLn = (parseFloat(ln1) + parseFloat(ln2)) / 2;
            const bbox = `54.8,24.8,55.8,25.8`;
            const url = `https://api.mapbox.com/search/geocode/v6/forward?q=cafe%20coffee%20restaurant&proximity=${mLn},${mLa}&bbox=${bbox}&country=AE&types=poi&limit=10&access_token=${MAPBOX_TOKEN}`;
            const res = await fetch(url);
            const d = await res.json();
            const list = document.getElementById('venue-list'); list.innerHTML = '';
            if (!d.features || d.features.length === 0) {
                list.innerHTML = "NO POIs FOUND.";
            } else {
                d.features.forEach(s => {
                    const card = document.createElement('div'); card.className = 'venue-card';
                    card.innerHTML = `<strong>${s.properties.name.toUpperCase()}</strong>`;
                    list.appendChild(card);
                });
            }
            document.getElementById('oracle-ballot').style.display = 'block';
        }
        setInterval(scan, 5000); scan();
    </script>
</body>
</html>
