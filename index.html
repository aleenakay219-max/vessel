<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBELISK 1.0 | CREATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00ff00; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #terminal { height: 80vh; overflow-y: auto; padding: 20px; border-bottom: 1px solid var(--neon); }
        #input-area { height: 20vh; display: flex; padding: 10px; background: #111; }
        input { flex: 1; background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        
        /* ORACLE UI */
        #oracle-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; text-align: center; }
        .oracle-btn { display: none; background: rgba(0,0,0,0.9); color: var(--neon); border: 1px solid var(--neon); padding: 15px; width: 100%; cursor: pointer; letter-spacing: 2px; }
        #oracle-ballot { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #000; border: 1px solid var(--neon); padding: 20px; z-index: 2001; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="messages">--- OBELISK PROTOCOL ONLINE ---</div>
</div>

<div id="oracle-container">
    <button id="oracle-btn" class="oracle-btn" onclick="initiateOracle()">[ INITIATE ORACLE ]</button>
</div>

<div id="oracle-ballot">
    <h3 style="border-bottom: 1px solid var(--neon)">ORACLE SYNC</h3>
    <div id="venue-list">Synchronizing with peer hardware...</div>
</div>

<div id="input-area">
    <input type="text" id="msgInput" placeholder="TYPE MESSAGE..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
    // --- DATABASE CONFIG ---
    const _supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');
    let currentBridgeId = null; // Set this when bridge is established

    // --- MESSAGE LOGIC ---
    async function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if(!text || !currentBridgeId) return;

        await _supabase.from('messages').insert([{ node_id: currentBridgeId, content: text, sender: 'creator' }]);
        document.getElementById('msgInput').value = '';
    }

    // --- ORACLE ENGINE ---
    const monitorOracle = (bridgeId) => {
        _supabase.channel('oracle-check').on('postgres_changes', { 
            event: 'UPDATE', schema: 'public', table: 'nodes', filter: `id=eq.${bridgeId}` 
        }, payload => {
            if (payload.new.msg_count >= 5) document.getElementById('oracle-btn').style.display = 'block';
        }).subscribe();
    };

    async function initiateOracle() {
        const btn = document.getElementById('oracle-btn');
        btn.innerText = "CAPTURING GPS...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await _supabase.from('oracle_sessions').upsert({ 
                bridge_id: currentBridgeId, u1_lat: pos.coords.latitude, u1_lng: pos.coords.longitude, status: 'waiting'
            });
            document.getElementById('oracle-ballot').style.display = 'block';
            btn.innerText = "WAITING FOR PEER...";
        });
    }

    const listenForPeer = (bridgeId) => {
        _supabase.channel('peer-sync').on('postgres_changes', { 
            event: 'INSERT', schema: 'public', table: 'oracle_sessions', filter: `bridge_id=eq.${bridgeId}` 
        }, () => {
            document.getElementById('oracle-ballot').style.display = 'block';
        }).subscribe();
    };
</script>
</body>
</html>
