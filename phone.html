<!DOCTYPE html>
<html>
<head>
    <title>OBELISK 1.0 | SEEKER</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-overlay { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1; width: 90%; text-align: center; }
        .scan-btn { background: #00ff00; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay">
    <button class="scan-btn" onclick="scanForVessels()">[ SCAN FOR VESSELS ]</button>
</div>

<script>
    const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmFkYXJraGFuMTE1IiwiYSI6ImNtb2dybG02cDB6bXAyd3M2dDZoeGR3ZzAifQ.-Bepjo9kyGavV3lO3LOWug';
    const SUPABASE_URL = 'https://rnroyhkvkmzuichysxnk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJucm95aGt2a216dWljaHlzeG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjIzMDAsImV4cCI6MjA5MjQ5ODMwMH0.O1poxwOr2kESKiqRTgkb86AFFwIN8wEMuW10UEsp_DU';

    mapboxgl.accessToken = MAPBOX_TOKEN;
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v10',
        center: [55.3, 25.3],
        zoom: 12
    });

    async function scanForVessels() {
        const { data, error } = await _supabase
            .from('nodes')
            .select('*')
            .eq('status', 'active');

        if (data) {
            data.forEach(node => {
                const marker = new mapboxgl.Marker({ color: '#00ff00' })
                    .setLngLat([node.lng, node.lat])
                    .addTo(map);
                
                marker.getElement().addEventListener('click', () => {
                    alert("VESSEL DETECTED\nID: " + node.id + "\nInitiating secure handshake...");
                });
            });
        } else if (error) {
            console.error("Scan Error:", error);
        }
    }
</script>
</body>
</html>
